// ─── EXCEL ────────────────────────────────────
function exportExcel({ title, subtitle, columns, rows, summaryCards, filename, sheetName, companyName }) {
  const wb = XLSX.utils.book_new();
  const ws_data = [];

  // Title rows
  ws_data.push([companyName || "نظام الحضور والانصراف"]);
  ws_data.push([title]);
  if (subtitle) ws_data.push([subtitle]);
  ws_data.push([`تاريخ التصدير: ${new Date().toLocaleDateString("ar-EG")}`]);
  ws_data.push([]);

  // Summary cards row
  if (summaryCards && summaryCards.length > 0) {
    ws_data.push(summaryCards.map(c => `${c.label}: ${c.value}`));
    ws_data.push([]);
  }

  // Headers
  ws_data.push(columns.map(c => c.header));

  // Data rows
  rows.forEach(r => ws_data.push(columns.map(c => r[c.key] ?? "-")));

  const ws = XLSX.utils.aoa_to_sheet(ws_data);

  // Column widths
  ws["!cols"] = columns.map(c => ({ wch: c.width || 18 }));

  // Merge title cell across all columns
  const totalCols = columns.length;
  ws["!merges"] = [
    { s: { r: 0, c: 0 }, e: { r: 0, c: totalCols - 1 } },
    { s: { r: 1, c: 0 }, e: { r: 1, c: totalCols - 1 } },
  ];
  if (subtitle) ws["!merges"].push({ s: { r: 2, c: 0 }, e: { r: 2, c: totalCols - 1 } });

  // Cell styles helper
  const styleCell = (addr, style) => {
    if (!ws[addr]) ws[addr] = { t: "s", v: "" };
    ws[addr].s = style;
  };

  // Title style
  const titleStyle = { font: { bold: true, sz: 16, color: { rgb: "FFFFFF" } }, fill: { fgColor: { rgb: "1E3A5F" } }, alignment: { horizontal: "center", vertical: "center" } };
  styleCell("A1", { ...titleStyle, font: { bold: true, sz: 12, color: { rgb: "FFFFFF" } } });
  styleCell("A2", titleStyle);

  // Header row style
  const headerRowIdx = (subtitle ? 5 : 4) + (summaryCards?.length > 0 ? 2 : 0);
  columns.forEach((_, ci) => {
    const addr = XLSX.utils.encode_cell({ r: headerRowIdx, c: ci });
    styleCell(addr, {
      font: { bold: true, color: { rgb: "FFFFFF" }, sz: 11 },
      fill: { fgColor: { rgb: "1E3A5F" } },
      alignment: { horizontal: "center" },
      border: { bottom: { style: "medium", color: { rgb: "2563A8" } } },
    });
  });

  // Data row styles
  rows.forEach((r, ri) => {
    const rowIdx = headerRowIdx + 1 + ri;
    const isAlt = ri % 2 === 1;
    columns.forEach((col, ci) => {
      const addr = XLSX.utils.encode_cell({ r: rowIdx, c: ci });
      let fill = isAlt ? { fgColor: { rgb: "EFF6FF" } } : { fgColor: { rgb: "FFFFFF" } };
      let font = { sz: 10 };
      if (col.key === "status") {
        const sv = r[col.key];
        const colorMap = { "حاضر": "16A34A", "متأخر": "D97706", "غائب": "DC2626", "إجازة": "0891B2", "مأمورية": "7C3AED" };
        const bgMap   = { "حاضر": "F0FDF4", "متأخر": "FFFBEB", "غائب": "FEF2F2", "إجازة": "E0F2FE", "مأمورية": "F5F3FF" };
        fill = { fgColor: { rgb: bgMap[sv] || "F1F5F9" } };
        font = { sz: 10, bold: true, color: { rgb: colorMap[sv] || "374151" } };
      }
      if (col.key === "lateMinutes" && r[col.key] && parseInt(r[col.key]) > 0) {
        font = { sz: 10, bold: true, color: { rgb: "D97706" } };
      }
      styleCell(addr, { font, fill, alignment: { horizontal: "center" }, border: { bottom: { style: "thin", color: { rgb: "E2E8F0" } }, right: { style: "thin", color: { rgb: "E2E8F0" } } } });
    });
  });

  XLSX.utils.book_append_sheet(wb, ws, sheetName || "التقرير");
  XLSX.writeFile(wb, filename || "تقرير.xlsx");
}

const generateId = () => Math.random().toString(36).substr(2, 9) + Date.now().toString(36);

const getToday = () => new Date().toISOString().split("T")[0];

const getTimeNow = () => {
  const n = new Date();
  return `${String(n.getHours()).padStart(2, "0")}:${String(n.getMinutes()).padStart(2, "0")}`;
};

const calcWorkHours = (checkIn, checkOut) => {
  if (!checkIn || !checkOut) return "-";
  const [ih, im] = checkIn.split(":").map(Number);
  const [oh, om] = checkOut.split(":").map(Number);
  let diff = (oh * 60 + om) - (ih * 60 + im);
  // لو الانصراف بعد منتصف الليل (رقم سالب) نضيف 24 ساعة
  if (diff <= 0) diff += 24 * 60;
  // لو الفرق أكبر من 24 ساعة فالبيانات غلط
  if (diff > 24 * 60) return "-";
  const h = Math.floor(diff / 60);
  const m = diff % 60;
  return `${h}س ${m}د`;
};

const calcLateMinutes = (checkIn, workStart, tolerance) => {
  if (!checkIn) return 0;
  const [ih, im] = checkIn.split(":").map(Number);
  const [wh, wm] = workStart.split(":").map(Number);
  let diff = (ih * 60 + im) - (wh * 60 + wm);
  // لو الشيفت بيبدأ بالليل (مثلاً 22:00) والحضور بعد منتصف الليل (مثلاً 01:00)
  // الفارق هيبقى سالب جداً — نضيف 24 ساعة
  if (diff < -12 * 60) diff += 24 * 60;
  return diff > tolerance ? diff : 0;
};

const getStatus = (checkIn, workStart, tolerance) => {
  if (!checkIn) return "غائب";
  const late = calcLateMinutes(checkIn, workStart, tolerance);
  return late > 0 ? "متأخر" : "حاضر";
};

const formatDateAr = (dateStr) => {
  if (!dateStr) return "-";
  const d = new Date(dateStr + "T00:00:00");
  return d.toLocaleDateString("ar-EG", { weekday: "short", year: "numeric", month: "short", day: "numeric" });
};

const dayNameAr = (dateStr) => {
  const days = ["الأحد", "الاثنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة", "السبت"];
  return days[new Date(dateStr + "T00:00:00").getDay()];
};

// ══════════════════════════════════════════════
//  DEVICE ID — معرّف ثابت للجهاز في localStorage
// ══════════════════════════════════════════════
function getOrCreateDeviceId() {
  let id = localStorage.getItem(KEYS.deviceId);
  if (!id) {
    id = "dev_" + Math.random().toString(36).slice(2, 10) + "_" + Date.now().toString(36);
    localStorage.setItem(KEYS.deviceId, id);
  }
  return id;
}

// ══════════════════════════════════════════════
//  DEVICE AUTH HOOK
//  يتحكم في: هل الجهاز ده معتمد؟ وعلى أي فرع؟
// ══════════════════════════════════════════════
function useDeviceAuth() {
  const deviceId = getOrCreateDeviceId();
  // status: "checking" | "pending" | "approved" | "rejected" | "unknown"
  const [status, setStatus]     = useState("checking");
  const [approvedBranchId, setApprovedBranchId] = useState(null);
  const [deviceName, setDeviceName]   = useState(() => localStorage.getItem("att_device_name") || "");

  useEffect(() => {
    let unsub = null;
    function attach() {
      const db = window.__fsdb;
      if (!db) { setTimeout(attach, 300); return; }
      // استمع على وثيقة الجهاز ده في collection "devices"
      unsub = db.collection("devices").doc(deviceId).onSnapshot(snap => {
        if (!snap.exists) {
          setStatus("unknown"); // جهاز جديد — لسه مش مسجّل
          return;
        }
        const data = snap.data();
        if (data.status === "approved") {
          setApprovedBranchId(data.branchId);
          setStatus("approved");
        } else if (data.status === "rejected") {
          setStatus("rejected");
        } else {
          setStatus("pending");
        }
      }, () => setStatus("unknown"));
    }
    attach();
    return () => unsub && unsub();
  }, [deviceId]);

  // إرسال طلب اعتماد للمدير
  function requestApproval(name, branchId) {
    const db = window.__fsdb;
    if (!db) return;
    localStorage.setItem("att_device_name", name);
    setDeviceName(name);
    db.collection("devices").doc(deviceId).set({
      deviceId,
      name,
      branchId: branchId || null,
      status:   "pending",
      requestedAt: new Date().toISOString(),
      userAgent: navigator.userAgent.slice(0, 100),
    });
    setStatus("pending");
  }

  return { deviceId, status, approvedBranchId, deviceName, requestApproval };
}

function useDB() {
  const [employees, setEmployeesState] = useState(() => {
    try { const s = localStorage.getItem(KEYS.employees); return s ? JSON.parse(s) : DEFAULT_EMPLOYEES; } catch { return DEFAULT_EMPLOYEES; }
  });
  const [records, setRecordsState] = useState(() => {
    try { const s = localStorage.getItem(KEYS.records); return s ? JSON.parse(s) : DEFAULT_RECORDS; } catch { return DEFAULT_RECORDS; }
  });
  const [settings, setSettingsState] = useState(() => {
    try { const s = localStorage.getItem(KEYS.settings); return s ? { ...DEFAULT_SETTINGS, ...JSON.parse(s) } : DEFAULT_SETTINGS; } catch { return DEFAULT_SETTINGS; }
  });
  const [shifts, setShiftsState] = useState(() => {
    try { const s = localStorage.getItem(KEYS.shifts); return s ? JSON.parse(s) : DEFAULT_SHIFTS; } catch { return DEFAULT_SHIFTS; }
  });
  const [messages, setMessagesState] = useState(() => {
    try { const s = localStorage.getItem(KEYS.messages); return s ? JSON.parse(s) : []; } catch { return []; }
  });
  const [branches, setBranchesState] = useState(() => {
    try { const s = localStorage.getItem(KEYS.branches); return s ? JSON.parse(s) : []; } catch { return []; }
  });
  const [devices, setDevicesState] = useState([]);
  const [synced, setSynced] = useState(false);
  const [online, setOnline] = useState(navigator.onLine);

  // مراقبة الاتصال
  useEffect(() => {
    const on = () => setOnline(true);
    const off = () => setOnline(false);
    window.addEventListener("online", on);
    window.addEventListener("offline", off);
    return () => { window.removeEventListener("online", on); window.removeEventListener("offline", off); };
  }, []);

  // Firebase real-time listeners (compat API) - مع retry
  useEffect(() => {
    let unsubs = [];
    let cancelled = false;

    function attach() {
      const db = window.__fsdb;
      if (!db) { if (!cancelled) setTimeout(attach, 200); return; }

      // { includeMetadataChanges: false } = بيستنى Server confirmation بس مش local writes
      const snapOpts = { includeMetadataChanges: false };

      unsubs.push(db.collection("employees").onSnapshot(snapOpts, snap => {
        // بنتجاهل التحديثات اللي من الجهاز نفسه (local) عشان مانعملش loop
        if (snap.metadata.fromCache) return;
        if (!snap.empty) {
          const data = snap.docs.map(d => d.data());
          setEmployeesState(data);
          localStorage.setItem(KEYS.employees, JSON.stringify(data));
        }
        setSynced(true);
      }, () => setSynced(false)));

      unsubs.push(db.collection("records").onSnapshot(snapOpts, snap => {
        if (snap.metadata.fromCache) return;
        if (!snap.empty) {
          const data = snap.docs.map(d => d.data());
          setRecordsState(data);
          localStorage.setItem(KEYS.records, JSON.stringify(data));
        }
      }, () => {}));

      unsubs.push(db.collection("settings").onSnapshot(snapOpts, snap => {
        if (snap.metadata.fromCache) return;
        if (!snap.empty) {
          const merged = {};
          snap.docs.forEach(d => Object.assign(merged, d.data()));
          const s = { ...DEFAULT_SETTINGS, ...merged };
          setSettingsState(s);
          localStorage.setItem(KEYS.settings, JSON.stringify(s));
        }
      }, () => {}));

      unsubs.push(db.collection("shifts").onSnapshot(snapOpts, snap => {
        if (snap.metadata.fromCache) return;
        if (!snap.empty) {
          const data = snap.docs.map(d => d.data());
          setShiftsState(data);
          localStorage.setItem(KEYS.shifts, JSON.stringify(data));
        }
      }, () => {}));

      unsubs.push(db.collection("messages").onSnapshot(snapOpts, snap => {
        if (snap.metadata.fromCache) return;
        const data = snap.docs.map(d => d.data());
        setMessagesState(data);
        localStorage.setItem(KEYS.messages, JSON.stringify(data));
      }, () => {}));

      unsubs.push(db.collection("branches").onSnapshot(snapOpts, snap => {
        if (snap.metadata.fromCache) return;
        const data = snap.docs.map(d => d.data());
        setBranchesState(data);
        localStorage.setItem(KEYS.branches, JSON.stringify(data));
      }, () => {}));

      // devices — real-time للأدمن يشوف الطلبات فوراً
      unsubs.push(db.collection("devices").onSnapshot(snapOpts, snap => {
        if (snap.metadata.fromCache) return;
        setDevicesState(snap.docs.map(d => d.data()));
      }, () => {}));
    }

    attach();
    return () => { cancelled = true; unsubs.forEach(u => u()); };
  }, []);

  // ══ FAST Firebase Helpers ══
  // بيكتب doc واحد بس بدل ما يكتب كل الـ array
  function fsSet(collName, docId, data) {
    const fsdb = window.__fsdb;
    if (fsdb) fsdb.collection(collName).doc(docId).set(data).catch(() => {});
  }

  function fsDel(collName, docId) {
    const fsdb = window.__fsdb;
    if (fsdb) fsdb.collection(collName).doc(docId).delete().catch(() => {});
  }

  // setEmployees: بيحدد إيه اللي اتغير ويكتبه بس
  const setEmployees = useCallback((val) => {
    const next = typeof val === "function" ? val(employees) : val;
    setEmployeesState(next);
    localStorage.setItem(KEYS.employees, JSON.stringify(next));
    const db = window.__fsdb;
    if (!db) return;
    // اكتشف الفرق — اكتب المضاف أو المعدل بس
    const prevIds = new Set(employees.map(e => e.id));
    const nextIds = new Set(next.map(e => e.id));
    // موظفين اتحذفوا
    employees.forEach(e => { if (!nextIds.has(e.id)) fsDel("employees", e.id); });
    // موظفين جدد أو اتعدلوا
    next.forEach(e => {
      const old = employees.find(o => o.id === e.id);
      if (!old || JSON.stringify(old) !== JSON.stringify(e)) fsSet("employees", e.id, e);
    });
  }, [employees]);

  const setRecords = useCallback((val) => {
    const next = typeof val === "function" ? val(records) : val;
    setRecordsState(next);
    localStorage.setItem(KEYS.records, JSON.stringify(next));
    const db = window.__fsdb;
    if (!db) return;
    // سجلات اتحذفت
    records.forEach(r => { if (!next.find(n => n.id === r.id)) fsDel("records", r.id); });
    // سجلات جديدة أو اتعدلت
    next.forEach(r => {
      const old = records.find(o => o.id === r.id);
      if (!old || JSON.stringify(old) !== JSON.stringify(r)) fsSet("records", r.id, r);
    });
  }, [records]);

  const setSettings = useCallback((val) => {
    const next = typeof val === "function" ? val(settings) : val;
    setSettingsState(next);
    localStorage.setItem(KEYS.settings, JSON.stringify(next));
    const db = window.__fsdb;
    if (db) db.collection("settings").doc("main").set(next).catch(() => {});
  }, [settings]);

  const setShifts = useCallback((val) => {
    const next = typeof val === "function" ? val(shifts) : val;
    setShiftsState(next);
    localStorage.setItem(KEYS.shifts, JSON.stringify(next));
    const db = window.__fsdb;
    if (!db) return;
    shifts.forEach(s => { if (!next.find(n => n.id === s.id)) fsDel("shifts", s.id); });
    next.forEach(s => {
      const old = shifts.find(o => o.id === s.id);
      if (!old || JSON.stringify(old) !== JSON.stringify(s)) fsSet("shifts", s.id, s);
    });
  }, [shifts]);

  const setMessages = useCallback((val) => {
    const next = typeof val === "function" ? val(messages) : val;
    setMessagesState(next);
    localStorage.setItem(KEYS.messages, JSON.stringify(next));
    const db = window.__fsdb;
    if (!db) return;
    messages.forEach(m => { if (!next.find(n => n.id === m.id)) fsDel("messages", m.id); });
    next.forEach(m => {
      const old = messages.find(o => o.id === m.id);
      if (!old || JSON.stringify(old) !== JSON.stringify(m)) fsSet("messages", m.id, m);
    });
  }, [messages]);

  const setBranches = useCallback((val) => {
    const next = typeof val === "function" ? val(branches) : val;
    setBranchesState(next);
    localStorage.setItem(KEYS.branches, JSON.stringify(next));
    const db = window.__fsdb;
    if (!db) return;
    branches.forEach(b => { if (!next.find(n => n.id === b.id)) fsDel("branches", b.id); });
    next.forEach(b => {
      const old = branches.find(o => o.id === b.id);
      if (!old || JSON.stringify(old) !== JSON.stringify(b)) fsSet("branches", b.id, b);
    });
  }, [branches]);

  // approve / reject جهاز مباشرة في Firestore
  const approveDevice = useCallback((deviceId, branchId) => {
    const db = window.__fsdb; if (!db) return;
    db.collection("devices").doc(deviceId).update({ status: "approved", branchId, approvedAt: new Date().toISOString() });
  }, []);

  const rejectDevice = useCallback((deviceId) => {
    const db = window.__fsdb; if (!db) return;
    db.collection("devices").doc(deviceId).update({ status: "rejected", rejectedAt: new Date().toISOString() });
  }, []);

  const deleteDevice = useCallback((deviceId) => {
    const db = window.__fsdb; if (!db) return;
    db.collection("devices").doc(deviceId).delete();
  }, []);

  return { employees, setEmployees, records, setRecords, settings, setSettings, shifts, setShifts, messages, setMessages, branches, setBranches, devices, approveDevice, rejectDevice, deleteDevice, synced, online };
}

function Toast({ toasts }) {
  return (
    <div style={{ position: "fixed", top: 20, left: "50%", transform: "translateX(-50%)", zIndex: 9999, display: "flex", flexDirection: "column", gap: 8, alignItems: "center" }}>
      {toasts.map(t => (
        <div key={t.id} style={{
          padding: "12px 24px", borderRadius: 10, fontWeight: "bold", fontSize: 14,
          background: t.type === "success" ? "#22c55e" : t.type === "error" ? "#ef4444" : "#3b82f6",
          color: "white", boxShadow: "0 4px 20px rgba(0,0,0,0.25)",
          animation: "slideDown 0.3s ease", fontFamily: "Cairo, Arial",
        }}>{t.msg}</div>
      ))}
    </div>
  );
}

function useToast() {
  const [toasts, setToasts] = useState([]);
  const show = useCallback((msg, type = "success") => {
    const id = Date.now();
    setToasts(p => [...p, { id, msg, type }]);
    setTimeout(() => setToasts(p => p.filter(t => t.id !== id)), 2800);
  }, []);
  return { toasts, show };
}

// ══════════════════════════════════════════════
//  TAB: BRANCHES MANAGEMENT (Admin)
// ══════════════════════════════════════════════
function TabBranches({ branches, setBranches, employees, setEmployees, toast }) {
  const [modal, setModal] = useState(null);
  const [form, setForm] = useState({ name: "", code: "" });
  const [delConfirm, setDelConfirm] = useState(null);

  function generateCode(name) {
    return "BRANCH-" + name.replace(/\s+/g, "-").toUpperCase().slice(0, 12) + "-" + Math.floor(1000 + Math.random() * 9000);
  }

  function openAdd() {
    setForm({ name: "", code: "" });
    setModal("add");
  }

  function openEdit(b) {
    setForm({ name: b.name, code: b.code });
    setModal(b);
  }

  function saveBranch() {
    if (!form.name.trim() || !form.code.trim()) { toast("اسم الفرع والكود مطلوبين", "error"); return; }
    const codeUp = form.code.trim().toUpperCase();
    // تأكد الكود مش مكرر
    const dup = branches.find(b => b.code === codeUp && (modal === "add" || b.id !== modal.id));
    if (dup) { toast("هذا الكود موجود بالفعل لفرع آخر!", "error"); return; }
    if (modal === "add") {
      const newBranch = { id: generateId(), name: form.name.trim(), code: codeUp, createdAt: getToday() };
      setBranches(p => [...p, newBranch]);
      toast("✅ تم إضافة الفرع بنجاح");
    } else {
      setBranches(p => p.map(b => b.id === modal.id ? { ...b, name: form.name.trim(), code: codeUp } : b));
      toast("✅ تم تعديل بيانات الفرع");
    }
    setModal(null);
  }

  function deleteBranch(id) {
    const hasEmps = employees.some(e => e.branchId === id);
    if (hasEmps) { toast("لا يمكن حذف فرع به موظفين! انقل الموظفين أولاً", "error"); setDelConfirm(null); return; }
    setBranches(p => p.filter(b => b.id !== id));
    toast("🗑️ تم حذف الفرع", "error");
    setDelConfirm(null);
  }

  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 20 }}>
        <h2 style={{ margin: 0, color: "#1e3a5f", fontSize: 20, fontWeight: "800" }}>🏪 إدارة الفروع</h2>
        <button onClick={openAdd} style={{ padding: "10px 20px", background: "#1e3a5f", color: "white", border: "none", borderRadius: 10, fontWeight: "700", cursor: "pointer", fontSize: 14, fontFamily: "Cairo, Arial" }}>
          ➕ فرع جديد
        </button>
      </div>

      {/* Info card */}
      <div style={{ background: "#eff6ff", border: "2px solid #bfdbfe", borderRadius: 12, padding: "14px 18px", marginBottom: 20, fontSize: 13, color: "#1e40af", fontWeight: "600" }}>
        💡 كل فرع عنده كود سري — ادخل الكود ده على جهاز الفرع مرة واحدة وهيتذكره تلقائياً. الجهاز بعدها هيفتح شاشة الموظفين مباشرةً ويشوف موظفين الفرع ده بس.
      </div>

      {branches.length === 0 ? (
        <div style={{ background: "white", borderRadius: 14, padding: 48, textAlign: "center", boxShadow: "0 2px 10px rgba(0,0,0,0.06)" }}>
          <div style={{ fontSize: 48, marginBottom: 12 }}>🏪</div>
          <p style={{ color: "#94a3b8", fontSize: 15, fontWeight: "700" }}>لا توجد فروع بعد</p>
          <button onClick={openAdd} style={{ marginTop: 12, padding: "10px 24px", background: "#1e3a5f", color: "white", border: "none", borderRadius: 10, fontWeight: "700", cursor: "pointer", fontSize: 14, fontFamily: "Cairo, Arial" }}>
            ➕ أضف أول فرع
          </button>
        </div>
      ) : (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(300px, 1fr))", gap: 16 }}>
          {branches.map(b => {
            const empCount = employees.filter(e => e.branchId === b.id).length;
            return (
              <div key={b.id} style={{ background: "white", borderRadius: 14, padding: 20, boxShadow: "0 2px 10px rgba(0,0,0,0.06)", border: "2px solid #f1f5f9" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 12 }}>
                  <div>
                    <div style={{ fontWeight: "800", fontSize: 16, color: "#1e293b", marginBottom: 4 }}>🏪 {b.name}</div>
                    <div style={{ fontSize: 12, color: "#64748b" }}>أُضيف: {b.createdAt}</div>
                  </div>
                  <div style={{ display: "flex", gap: 6 }}>
                    <button onClick={() => openEdit(b)} style={{ padding: "6px 10px", background: "#eff6ff", color: "#2563a8", border: "none", borderRadius: 6, cursor: "pointer", fontSize: 12, fontWeight: "700", fontFamily: "Cairo, Arial" }}>✏️</button>
                    <button onClick={() => setDelConfirm(b)} style={{ padding: "6px 10px", background: "#fef2f2", color: "#dc2626", border: "none", borderRadius: 6, cursor: "pointer", fontSize: 12, fontWeight: "700", fontFamily: "Cairo, Arial" }}>🗑️</button>
                  </div>
                </div>
                {/* Code badge */}
                <div style={{ background: "#1e3a5f", color: "white", padding: "8px 14px", borderRadius: 8, fontFamily: "monospace", fontSize: 14, fontWeight: "700", letterSpacing: 1, textAlign: "center", marginBottom: 12 }}>
                  🔑 {b.code}
                </div>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <span style={{ fontSize: 13, color: "#475569", fontWeight: "600" }}>👥 {empCount} موظف</span>
                  <span style={{ fontSize: 11, background: empCount > 0 ? "#f0fdf4" : "#f8fafc", color: empCount > 0 ? "#16a34a" : "#94a3b8", padding: "2px 10px", borderRadius: 20, fontWeight: "700" }}>
                    {empCount > 0 ? "نشط" : "لا يوجد موظفين"}
                  </span>
                </div>
                {/* Reset device tip */}
                <div style={{ marginTop: 10, display: "flex", gap: 8, alignItems: "center" }}>
                  <button
                    onClick={() => { navigator.clipboard?.writeText(b.name).catch(()=>{}); toast(`✅ تم نسخ اسم ${b.name}`); }}
                    style={{ flex: 1, padding: "7px 10px", background: "#f0f9ff", color: "#0891b2", border: "1px solid #bae6fd", borderRadius: 7, fontWeight: "700", cursor: "pointer", fontSize: 12, fontFamily: "Cairo, Arial" }}>
                    📋 نسخ الاسم
                  </button>
                  <button
                    onClick={() => toast(`💡 لإدارة أجهزة ${b.name} — اذهب لتاب "الأجهزة"`, "info")}
                    style={{ flex: 1, padding: "7px 10px", background: "#fff7ed", color: "#d97706", border: "1px solid #fed7aa", borderRadius: 7, fontWeight: "700", cursor: "pointer", fontSize: 12, fontFamily: "Cairo, Arial" }}>
                    📱 الأجهزة
                  </button>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* Add/Edit Modal */}
      {modal && (
        <Modal title={modal === "add" ? "➕ فرع جديد" : "✏️ تعديل الفرع"} onClose={() => setModal(null)}>
          <div style={{ marginBottom: 14 }}>
            <label style={{ display: "block", marginBottom: 6, fontSize: 13, fontWeight: "700", color: "#374151" }}>اسم الفرع</label>
            <input value={form.name} onChange={e => {
              const name = e.target.value;
              setForm(p => ({ ...p, name, code: modal === "add" ? generateCode(name) : p.code }));
            }}
              placeholder="مثال: فرع القاهرة"
              style={{ width: "100%", padding: "10px 12px", border: "2px solid #e2e8f0", borderRadius: 8, fontSize: 14, fontFamily: "Cairo, Arial" }}
              onFocus={e => e.target.style.borderColor = "#2563a8"}
              onBlur={e => e.target.style.borderColor = "#e2e8f0"}
            />
          </div>
          <div style={{ marginBottom: 14 }}>
            <label style={{ display: "block", marginBottom: 6, fontSize: 13, fontWeight: "700", color: "#374151" }}>كود الفرع (سري)</label>
            <input value={form.code} onChange={e => setForm(p => ({ ...p, code: e.target.value.toUpperCase() }))}
              placeholder="BRANCH-CAIRO-01"
              style={{ width: "100%", padding: "10px 12px", border: "2px solid #e2e8f0", borderRadius: 8, fontSize: 14, fontFamily: "monospace", letterSpacing: 1, fontWeight: "700" }}
              onFocus={e => e.target.style.borderColor = "#2563a8"}
              onBlur={e => e.target.style.borderColor = "#e2e8f0"}
            />
            <p style={{ margin: "5px 0 0", fontSize: 11, color: "#94a3b8" }}>الكود بيتولد تلقائياً — تقدر تعدله. أعطيه لمسؤول الفرع فقط.</p>
          </div>
          <div style={{ display: "flex", gap: 10, marginTop: 8 }}>
            <button onClick={saveBranch} style={{ flex: 1, padding: "11px", background: "#1e3a5f", color: "white", border: "none", borderRadius: 8, fontWeight: "700", fontSize: 15, cursor: "pointer", fontFamily: "Cairo, Arial" }}>
              {modal === "add" ? "إضافة الفرع" : "حفظ التعديلات"}
            </button>
            <button onClick={() => setModal(null)} style={{ flex: 1, padding: "11px", background: "#f1f5f9", color: "#64748b", border: "none", borderRadius: 8, fontWeight: "700", fontSize: 15, cursor: "pointer", fontFamily: "Cairo, Arial" }}>إلغاء</button>
          </div>
        </Modal>
      )}

      {/* Delete Confirm */}
      {delConfirm && (
        <Modal title="⚠️ تأكيد الحذف" onClose={() => setDelConfirm(null)}>
          <p style={{ fontSize: 14, color: "#374151", marginBottom: 20, fontWeight: "600" }}>
            هل تريد حذف فرع "<strong>{delConfirm.name}</strong>"؟ لا يمكن التراجع.
          </p>
          <div style={{ display: "flex", gap: 10 }}>
            <button onClick={() => deleteBranch(delConfirm.id)} style={{ flex: 1, padding: "11px", background: "#dc2626", color: "white", border: "none", borderRadius: 8, fontWeight: "700", fontSize: 15, cursor: "pointer", fontFamily: "Cairo, Arial" }}>🗑️ حذف</button>
            <button onClick={() => setDelConfirm(null)} style={{ flex: 1, padding: "11px", background: "#f1f5f9", color: "#64748b", border: "none", borderRadius: 8, fontWeight: "700", fontSize: 15, cursor: "pointer", fontFamily: "Cairo, Arial" }}>إلغاء</button>
          </div>
        </Modal>
      )}
    </div>
  );
}


function LoginScreen({ onLogin, settings, employees: empFromDB, branches, deviceBranchId, adminOnly }) {
  const [role, setRole] = useState(adminOnly ? "admin" : "employee");
  const [username, setUsername] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const [showPass, setShowPass] = useState(false);
  const [time, setTime] = useState(new Date());

  // اسم الفرع المسجّل على هذا الجهاز
  const deviceBranch = deviceBranchId && branches
    ? branches.find(b => b.id === deviceBranchId)
    : null;

  useEffect(() => {
    const t = setInterval(() => setTime(new Date()), 1000);
    return () => clearInterval(t);
  }, []);

  function handleLogin() {
    setError("");
    if (!username || !password) { setError("من فضلك أدخل اسم المستخدم وكلمة السر"); return; }
    if (role === "admin") {
      // المدير يدخل من أي مكان بدون قيود
      if (username === settings.adminUsername && password === settings.adminPassword) {
        onLogin({ role: "admin", name: settings.companyName || "المدير" });
      } else { setError("اسم المستخدم أو كلمة السر غير صحيحة"); }
    } else {
      const employees = (empFromDB && empFromDB.length > 0)
        ? empFromDB
        : JSON.parse(localStorage.getItem(KEYS.employees) || JSON.stringify(DEFAULT_EMPLOYEES));
      const emp = employees.find(e => e.username === username && e.password === password);
      if (emp) { onLogin({ role: "employee", ...emp }); }
      else { setError("اسم المستخدم أو كلمة السر غير صحيحة"); }
    }
  }

  const timeStr = time.toLocaleTimeString("ar-EG", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
  const dateStr = time.toLocaleDateString("ar-EG", { weekday: "long", year: "numeric", month: "long", day: "numeric" });

  return (
    <div style={{
      minHeight: "100vh", direction: "rtl", fontFamily: "Cairo, Arial, sans-serif",
      background: "linear-gradient(135deg, #0a1628 0%, #1e3a5f 45%, #0f4c8a 100%)",
      display: "flex", alignItems: "center", justifyContent: "center", position: "relative", overflow: "hidden",
    }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap');
        * { box-sizing: border-box; }
        input:focus { outline: none !important; }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
        @keyframes fadeUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
        @keyframes slideDown { from{opacity:0;transform:translateY(-20px)} to{opacity:1;transform:translateY(0)} }
        @keyframes pulse { 0%,100%{opacity:0.15} 50%{opacity:0.35} }
      `}</style>

      {/* Background circles */}
      {[...Array(5)].map((_, i) => (
        <div key={i} style={{
          position: "absolute", borderRadius: "50%", border: "1px solid rgba(255,255,255,0.08)",
          width: [300, 500, 700, 900, 1100][i], height: [300, 500, 700, 900, 1100][i],
          top: "50%", left: "50%", transform: "translate(-50%,-50%)",
          animation: `pulse ${3 + i}s ease-in-out infinite`, animationDelay: `${i * 0.4}s`
        }} />
      ))}

      <div style={{ position: "relative", zIndex: 10, width: "100%", maxWidth: 440, padding: "0 20px", animation: "fadeUp 0.6s ease" }}>
        {/* Clock */}
        <div style={{ textAlign: "center", marginBottom: 28 }}>
          <div style={{ fontSize: 13, color: "rgba(255,255,255,0.55)", marginBottom: 4, letterSpacing: 1 }}>{dateStr}</div>
          <div style={{ fontSize: 38, fontWeight: "800", color: "white", letterSpacing: 2, fontVariantNumeric: "tabular-nums" }}>{timeStr}</div>
        </div>

        {/* Card */}
        <div style={{ background: "rgba(255,255,255,0.97)", borderRadius: 24, padding: "36px 32px", boxShadow: "0 30px 80px rgba(0,0,0,0.5)" }}>
          <div style={{ textAlign: "center", marginBottom: 28 }}>
            <div style={{ fontSize: 48, marginBottom: 8, animation: "float 3s ease-in-out infinite" }}>🏢</div>
            <h1 style={{ margin: 0, fontSize: 22, fontWeight: "800", color: "#1e3a5f" }}>نظام الحضور والانصراف</h1>
            <p style={{ margin: "4px 0 0", fontSize: 13, color: "#94a3b8" }}>{settings.companyName}</p>
            {deviceBranch && (
              <div style={{ marginTop: 10, display: "inline-flex", alignItems: "center", gap: 6, background: "#f0fdf4", border: "1px solid #86efac", borderRadius: 20, padding: "4px 14px" }}>
                <span style={{ fontSize: 14 }}>🏪</span>
                <span style={{ fontSize: 13, fontWeight: "800", color: "#16a34a" }}>{deviceBranch.name}</span>
              </div>
            )}
          </div>

          {/* Role Toggle */}
          {!adminOnly && (
          <div style={{ display: "flex", background: "#f1f5f9", borderRadius: 14, padding: 4, marginBottom: 24, gap: 4 }}>
            {[{ val: "employee", label: "👤 موظف" }, { val: "admin", label: "👑 مدير" }].map(r => (
              <button key={r.val} onClick={() => { setRole(r.val); setError(""); setUsername(""); setPassword(""); }}
                style={{
                  flex: 1, padding: "10px", border: "none", borderRadius: 10, cursor: "pointer",
                  fontWeight: "700", fontSize: 15, transition: "all 0.25s", fontFamily: "Cairo, Arial",
                  background: role === r.val ? "#1e3a5f" : "transparent",
                  color: role === r.val ? "white" : "#64748b",
                  boxShadow: role === r.val ? "0 4px 12px rgba(30,58,95,0.35)" : "none",
                }}>{r.label}</button>
            ))}
          </div>
          )}
          {adminOnly && (
          <div style={{ display: "flex", justifyContent: "center", marginBottom: 24 }}>
            <div style={{ display: "inline-flex", alignItems: "center", gap: 8, background: "#1e3a5f", borderRadius: 12, padding: "10px 24px" }}>
              <span style={{ fontSize: 18 }}>👑</span>
              <span style={{ color: "white", fontWeight: "800", fontSize: 15 }}>دخول المدير</span>
            </div>
          </div>
          )}

          {/* Fields */}
          {[
            { label: "اسم المستخدم", val: username, set: setUsername, type: "text", placeholder: role === "admin" ? "admin" : "أدخل اسم المستخدم", icon: "👤" },
            { label: "كلمة السر", val: password, set: setPassword, type: showPass ? "text" : "password", placeholder: "••••••••", icon: "🔒" },
          ].map((f, i) => (
            <div key={i} style={{ marginBottom: 16 }}>
              <label style={{ display: "block", marginBottom: 6, color: "#374151", fontWeight: "700", fontSize: 13 }}>{f.label}</label>
              <div style={{ position: "relative" }}>
                <span style={{ position: "absolute", right: 12, top: "50%", transform: "translateY(-50%)", fontSize: 16 }}>{f.icon}</span>
                <input value={f.val} onChange={e => f.set(e.target.value)}
                  type={f.type} placeholder={f.placeholder}
                  onKeyDown={e => e.key === "Enter" && handleLogin()}
                  style={{
                    width: "100%", padding: "12px 40px 12px 40px", border: "2px solid #e2e8f0",
                    borderRadius: 10, fontSize: 15, fontFamily: "Cairo, Arial",
                    transition: "border 0.2s", background: "#fafafa",
                  }}
                  onFocus={e => e.target.style.borderColor = "#2563a8"}
                  onBlur={e => e.target.style.borderColor = "#e2e8f0"}
                />
                {i === 1 && (
                  <button onClick={() => setShowPass(p => !p)} style={{
                    position: "absolute", left: 12, top: "50%", transform: "translateY(-50%)",
                    background: "none", border: "none", cursor: "pointer", fontSize: 16,
                  }}>{showPass ? "🙈" : "👁️"}</button>
                )}
              </div>
            </div>
          ))}

          {error && (
            <div style={{ background: "#fef2f2", border: "1px solid #fca5a5", borderRadius: 8, padding: "10px 14px", marginBottom: 16, color: "#dc2626", fontSize: 13, fontWeight: "600" }}>
              ⚠️ {error}
            </div>
          )}

          <button onClick={handleLogin} style={{
            width: "100%", padding: "14px", background: "linear-gradient(135deg, #1e3a5f, #2563a8)",
            color: "white", border: "none", borderRadius: 12, fontSize: 17, fontWeight: "800",
            cursor: "pointer", fontFamily: "Cairo, Arial", letterSpacing: 1,
            boxShadow: "0 6px 20px rgba(30,58,95,0.4)", transition: "transform 0.15s",
          }}
            onMouseEnter={e => e.target.style.transform = "translateY(-1px)"}
            onMouseLeave={e => e.target.style.transform = "translateY(0)"}
          >
            دخول ←
          </button>

          {/* Import backup on login screen */}
          <div style={{ marginTop: 20, borderTop: "1px solid #e2e8f0", paddingTop: 16 }}>
            <p style={{ textAlign: "center", fontSize: 12, color: "#94a3b8", marginBottom: 10 }}>
              📱 بتفتح الملف لأول مرة على هذا المتصفح؟
            </p>
            <label style={{
              display: "block", width: "100%", padding: "11px", textAlign: "center",
              background: "#eff6ff", color: "#2563a8", border: "2px dashed #93c5fd",
              borderRadius: 10, fontWeight: "700", cursor: "pointer", fontSize: 13,
              fontFamily: "Cairo, Arial",
            }}>
              📥 تحميل بياناتك المحفوظة (JSON)
              <input type="file" accept=".json" style={{ display: "none" }} onChange={(e) => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                  try {
                    const data = JSON.parse(ev.target.result);
                    if (!data.employees || !data.records) { alert("❌ الملف غير صحيح!"); return; }
                    if (!window.confirm("هل تريد تحميل هذه البيانات؟ سيتم استبدال أي بيانات موجودة.")) return;
                    localStorage.setItem(KEYS.employees, JSON.stringify(data.employees));
                    localStorage.setItem(KEYS.records, JSON.stringify(data.records));
                    if (data.settings) localStorage.setItem(KEYS.settings, JSON.stringify(data.settings));
                    if (data.shifts) localStorage.setItem(KEYS.shifts, JSON.stringify(data.shifts));
                    alert("✅ تم تحميل البيانات! اضغط دخول الآن.");
                    window.location.reload();
                  } catch { alert("❌ خطأ في قراءة الملف!"); }
                };
                reader.readAsText(file); e.target.value = "";
              }} />
            </label>
            <p style={{ textAlign: "center", fontSize: 11, color: "#cbd5e1", marginTop: 8, marginBottom: 0 }}>
              💡 بعد أي تعديل، اضغط "حفظ نسخة احتياطية" من الإعدادات
            </p>
          </div>
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════
//  EMPLOYEE FORM MODAL
// ══════════════════════════════════════════════
function EmployeeFormModal({ emp, onSave, onClose, shifts, branches }) {
  const [form, setForm] = useState(emp || { name: "", username: "", password: "", department: "", phone: "", shiftId: shifts[0]?.id || "", branchId: "" });
  const [err, setErr] = useState("");

  const set = (k, v) => setForm(p => ({ ...p, [k]: v }));

  function save() {
    if (!form.name || !form.username || !form.password) { setErr("الاسم واليوزر والباسورد مطلوبين"); return; }
    onSave(form);
  }

  const fields = [
    { key: "name", label: "الاسم الكامل", placeholder: "أحمد محمد" },
    { key: "username", label: "اسم المستخدم", placeholder: "ahmed" },
    { key: "password", label: "كلمة السر", placeholder: "••••••" },
    { key: "department", label: "القسم", placeholder: "المبيعات" },
    { key: "phone", label: "رقم الموبايل", placeholder: "01001234567" },
  ];

  return (
    <Modal title={emp ? "✏️ تعديل موظف" : "➕ إضافة موظف جديد"} onClose={onClose}>
      {fields.map(f => (
        <div key={f.key} style={{ marginBottom: 14 }}>
          <label style={{ display: "block", marginBottom: 5, fontSize: 13, fontWeight: "700", color: "#374151" }}>{f.label}</label>
          <input value={form[f.key] || ""} onChange={e => set(f.key, e.target.value)}
            placeholder={f.placeholder}
            style={{ width: "100%", padding: "10px 12px", border: "2px solid #e2e8f0", borderRadius: 8, fontSize: 14, fontFamily: "Cairo, Arial" }}
            onFocus={e => e.target.style.borderColor = "#2563a8"}
            onBlur={e => e.target.style.borderColor = "#e2e8f0"}
          />
        </div>
      ))}
      {/* Shift selector */}
      <div style={{ marginBottom: 14 }}>
        <label style={{ display: "block", marginBottom: 5, fontSize: 13, fontWeight: "700", color: "#374151" }}>الشيفت المخصص</label>
        {shifts.length === 0 ? (
          <div style={{ fontSize: 13, color: "#94a3b8", padding: "10px 12px", border: "2px solid #e2e8f0", borderRadius: 8 }}>
            لا توجد شيفتات — أضف شيفت من الإعدادات أولاً
          </div>
        ) : (
          <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            {shifts.map(sh => (
              <label key={sh.id} style={{
                display: "flex", alignItems: "center", gap: 10, padding: "10px 14px",
                border: `2px solid ${form.shiftId === sh.id ? sh.color : "#e2e8f0"}`,
                borderRadius: 10, cursor: "pointer", transition: "all 0.2s",
                background: form.shiftId === sh.id ? `${sh.color}10` : "white",
              }}>
                <input type="radio" name="shift" value={sh.id} checked={form.shiftId === sh.id}
                  onChange={() => set("shiftId", sh.id)} style={{ accentColor: sh.color }} />
                <div>
                  <div style={{ fontWeight: "700", fontSize: 14, color: form.shiftId === sh.id ? sh.color : "#374151" }}>{sh.name}</div>
                  <div style={{ fontSize: 12, color: "#64748b" }}>{sh.start} ← {sh.end} &nbsp;|&nbsp; سماح: {sh.tolerance} دقيقة</div>
                </div>
                <span style={{ marginRight: "auto", width: 10, height: 10, borderRadius: "50%", background: sh.color, flexShrink: 0 }} />
              </label>
            ))}
          </div>
        )}
      </div>
      {/* Branch selector */}
      {branches && branches.length > 0 && (
        <div style={{ marginBottom: 14 }}>
          <label style={{ display: "block", marginBottom: 5, fontSize: 13, fontWeight: "700", color: "#374151" }}>الفرع</label>
          <select value={form.branchId || ""} onChange={e => set("branchId", e.target.value)}
            style={{ width: "100%", padding: "10px 12px", border: "2px solid #e2e8f0", borderRadius: 8, fontSize: 14, fontFamily: "Cairo, Arial", background: "white" }}
            onFocus={e => e.target.style.borderColor = "#2563a8"}
            onBlur={e => e.target.style.borderColor = "#e2e8f0"}>
            <option value="">— بدون فرع —</option>
            {branches.map(b => <option key={b.id} value={b.id}>{b.name}</option>)}
          </select>
        </div>
      )}
      {err && <div style={{ color: "#dc2626", fontSize: 13, marginBottom: 12, fontWeight: "600" }}>⚠️ {err}</div>}
      <div style={{ display: "flex", gap: 10, marginTop: 8 }}>
        <button onClick={save} style={{ flex: 1, padding: "11px", background: "#1e3a5f", color: "white", border: "none", borderRadius: 8, fontWeight: "700", fontSize: 15, cursor: "pointer", fontFamily: "Cairo, Arial" }}>
          {emp ? "حفظ التعديلات" : "إضافة الموظف"}
        </button>
        <button onClick={onClose} style={{ flex: 1, padding: "11px", background: "#f1f5f9", color: "#64748b", border: "none", borderRadius: 8, fontWeight: "700", fontSize: 15, cursor: "pointer", fontFamily: "Cairo, Arial" }}>
          إلغاء
        </button>
      </div>
    </Modal>
  );
}

// ══════════════════════════════════════════════
//  TAB: EMPLOYEES MANAGEMENT
// ══════════════════════════════════════════════
function TabEmployees({ employees, setEmployees, records, toast, shifts, branches }) {
  const [modal, setModal] = useState(null);
  const [search, setSearch] = useState("");
  const [delConfirm, setDelConfirm] = useState(null);

  const filtered = employees.filter(e =>
    e.name.includes(search) || e.username.includes(search) || (e.department || "").includes(search)
  );

  function saveEmployee(form) {
    if (modal === "add") {
      const exists = employees.find(e => e.username === form.username);
      if (exists) { toast("اسم المستخدم موجود بالفعل!", "error"); return; }
      setEmployees(p => [...p, { ...form, id: generateId(), createdAt: getToday() }]);
      toast("✅ تم إضافة الموظف بنجاح");
    } else {
      setEmployees(p => p.map(e => e.id === modal.id ? { ...e, ...form } : e));
      toast("✅ تم تعديل بيانات الموظف");
    }
    setModal(null);
  }

  function deleteEmployee(id) {
    setEmployees(p => p.filter(e => e.id !== id));
    toast("🗑️ تم حذف الموظف", "error");
    setDelConfirm(null);
  }

  const getAttCount = (id) => records.filter(r => r.employeeId === id).length;
  const getShift = (shiftId) => shifts.find(s => s.id === shiftId);

  return (
    <div>
      {modal && <EmployeeFormModal emp={modal === "add" ? null : modal} onSave={saveEmployee} onClose={() => setModal(null)} shifts={shifts} branches={branches || []} />}
      {delConfirm && (
        <Modal title="⚠️ تأكيد الحذف" onClose={() => setDelConfirm(null)}>
          <p style={{ color: "#374151", marginTop: 0 }}>هل أنت متأكد من حذف الموظف <strong>{delConfirm.name}</strong>؟</p>
          <p style={{ color: "#ef4444", fontSize: 13 }}>سيتم حذف الموظف فقط، سجلات الحضور ستبقى محفوظة.</p>
          <div style={{ display: "flex", gap: 10 }}>
            <button onClick={() => deleteEmployee(delConfirm.id)} style={{ flex: 1, padding: "11px", background: "#ef4444", color: "white", border: "none", borderRadius: 8, fontWeight: "700", cursor: "pointer", fontFamily: "Cairo, Arial" }}>نعم، احذف</button>
            <button onClick={() => setDelConfirm(null)} style={{ flex: 1, padding: "11px", background: "#f1f5f9", color: "#374151", border: "none", borderRadius: 8, fontWeight: "700", cursor: "pointer", fontFamily: "Cairo, Arial" }}>إلغاء</button>
          </div>
        </Modal>
      )}

      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 20, flexWrap: "wrap", gap: 12 }}>
        <h2 style={{ margin: 0, color: "#1e3a5f", fontSize: 20, fontWeight: "800" }}>👥 إدارة الموظفين</h2>
        <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
          <input value={search} onChange={e => setSearch(e.target.value)} placeholder="🔍 بحث..."
            style={{ padding: "8px 12px", border: "2px solid #e2e8f0", borderRadius: 8, fontSize: 14, fontFamily: "Cairo, Arial", width: 180 }}
            onFocus={e => e.target.style.borderColor = "#2563a8"}
            onBlur={e => e.target.style.borderColor = "#e2e8f0"}
          />
          <button onClick={() => setModal("add")} style={{ padding: "9px 18px", background: "#1e3a5f", color: "white", border: "none", borderRadius: 8, fontWeight: "700", cursor: "pointer", fontSize: 14, fontFamily: "Cairo, Arial" }}>
            ➕ موظف جديد
          </button>
        </div>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(150px, 1fr))", gap: 12, marginBottom: 20 }}>
        {[
          { label: "إجمالي الموظفين", val: employees.length, icon: "👥", color: "#1e3a5f" },
          { label: "حاضر اليوم", val: records.filter(r => r.date === getToday()).length, icon: "✅", color: "#16a34a" },
          { label: "غائب اليوم", val: employees.length - records.filter(r => r.date === getToday()).length, icon: "❌", color: "#dc2626" },
        ].map((s, i) => (
          <div key={i} style={{ background: "white", borderRadius: 12, padding: "16px", boxShadow: "0 2px 8px rgba(0,0,0,0.06)", borderRight: `4px solid ${s.color}` }}>
            <div style={{ fontSize: 24, marginBottom: 4 }}>{s.icon}</div>
            <div style={{ fontSize: 26, fontWeight: "800", color: s.color }}>{s.val}</div>
            <div style={{ fontSize: 12, color: "#64748b", fontWeight: "600" }}>{s.label}</div>
          </div>
        ))}
      </div>

      <div style={{ background: "white", borderRadius: 14, overflow: "hidden", boxShadow: "0 2px 10px rgba(0,0,0,0.06)" }}>
        <div style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontFamily: "Cairo, Arial" }}>
            <thead>
              <tr style={{ background: "#1e3a5f", color: "white" }}>
                {["#", "الاسم الكامل", "اليوزر", "القسم", "الفرع", "الشيفت", "الموبايل", "أيام الحضور", "الإجراءات"].map(h => (
                  <th key={h} style={{ padding: "13px 14px", textAlign: "right", fontSize: 13, fontWeight: "700", whiteSpace: "nowrap" }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {filtered.length === 0 ? (
                <tr><td colSpan={9} style={{ textAlign: "center", padding: 32, color: "#94a3b8", fontSize: 15 }}>لا يوجد موظفين</td></tr>
              ) : filtered.map((emp, i) => {
                const shift = getShift(emp.shiftId);
                const branch = (branches || []).find(b => b.id === emp.branchId);
                return (
                  <tr key={emp.id} style={{ background: i % 2 === 0 ? "#f8fafc" : "white", transition: "background 0.15s" }}
                    onMouseEnter={e => e.currentTarget.style.background = "#eff6ff"}
                    onMouseLeave={e => e.currentTarget.style.background = i % 2 === 0 ? "#f8fafc" : "white"}
                  >
                    <td style={{ padding: "12px 14px", color: "#94a3b8", fontSize: 13 }}>{i + 1}</td>
                    <td style={{ padding: "12px 14px", fontWeight: "700", color: "#1e293b" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                        <div style={{ width: 34, height: 34, borderRadius: "50%", background: shift ? shift.color : `hsl(${emp.name.charCodeAt(0) * 5},60%,50%)`, display: "flex", alignItems: "center", justifyContent: "center", color: "white", fontSize: 15, fontWeight: "800", flexShrink: 0 }}>
                          {emp.name[0]}
                        </div>
                        {emp.name}
                      </div>
                    </td>
                    <td style={{ padding: "12px 14px", color: "#475569", fontSize: 13 }}>
                      <code style={{ background: "#f1f5f9", padding: "2px 8px", borderRadius: 4, fontSize: 13 }}>{emp.username}</code>
                    </td>
                    <td style={{ padding: "12px 14px", color: "#475569" }}>
                      <span style={{ background: "#eff6ff", color: "#2563a8", padding: "3px 10px", borderRadius: 20, fontSize: 12, fontWeight: "700" }}>{emp.department || "-"}</span>
                    </td>
                    <td style={{ padding: "12px 14px" }}>
                      {branch ? (
                        <span style={{ background: "#f0fdf4", color: "#16a34a", padding: "3px 10px", borderRadius: 20, fontSize: 12, fontWeight: "700", whiteSpace: "nowrap" }}>
                          🏪 {branch.name}
                        </span>
                      ) : <span style={{ color: "#94a3b8", fontSize: 12 }}>—</span>}
                    </td>
                    <td style={{ padding: "12px 14px" }}>
                      {shift ? (
                        <span style={{ background: `${shift.color}18`, color: shift.color, padding: "3px 10px", borderRadius: 20, fontSize: 12, fontWeight: "700", whiteSpace: "nowrap" }}>
                          {shift.name}
                        </span>
                      ) : <span style={{ color: "#94a3b8", fontSize: 12 }}>غير محدد</span>}
                    </td>
                    <td style={{ padding: "12px 14px", color: "#475569", fontSize: 13 }}>{emp.phone || "-"}</td>
                    <td style={{ padding: "12px 14px" }}>
                      <span style={{ background: "#f0fdf4", color: "#16a34a", padding: "3px 10px", borderRadius: 20, fontSize: 12, fontWeight: "700" }}>{getAttCount(emp.id)} يوم</span>
                    </td>
                    <td style={{ padding: "12px 14px" }}>
                      <div style={{ display: "flex", gap: 6 }}>
                        <button onClick={() => setModal(emp)} style={{ padding: "6px 12px", background: "#eff6ff", color: "#2563a8", border: "none", borderRadius: 6, cursor: "pointer", fontSize: 13, fontWeight: "700", fontFamily: "Cairo, Arial" }}>✏️ تعديل</button>
                        <button onClick={() => setDelConfirm(emp)} style={{ padding: "6px 12px", background: "#fef2f2", color: "#dc2626", border: "none", borderRadius: 6, cursor: "pointer", fontSize: 13, fontWeight: "700", fontFamily: "Cairo, Arial" }}>🗑️ حذف</button>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}


// ══════════════════════════════════════════════
//  TAB: ATTENDANCE RECORDS
// ══════════════════════════════════════════════
function TabAttendance({ employees, records, toast, settings, branches }) {
  const [filterEmp, setFilterEmp] = useState("all");
  const [filterFrom, setFilterFrom] = useState("");
  const [filterTo, setFilterTo] = useState("");
  const [filterBranch, setFilterBranch] = useState("all");

  // الموظفين المفلترين بالفرع (للـ dropdown)
  const empsByBranch = filterBranch === "all"
    ? employees
    : employees.filter(e => e.branchId === filterBranch);

  const filtered = records.filter(r => {
    if (filterEmp !== "all" && r.employeeId !== filterEmp) return false;
    if (filterBranch !== "all") {
      const emp = employees.find(e => e.id === r.employeeId);
      if (!emp || emp.branchId !== filterBranch) return false;
    }
    if (filterFrom && r.date < filterFrom) return false;
    if (filterTo && r.date > filterTo) return false;
    return true;
  }).sort((a, b) => b.date.localeCompare(a.date));

  const getEmpName = (id) => employees.find(e => e.id === id)?.name || "غير معروف";

  // ─── إحصائيات سريعة ───
  const totalPresent = filtered.filter(r => r.status === "حاضر").length;
  const totalLate    = filtered.filter(r => r.status === "متأخر").length;
  const totalAbsent  = filtered.filter(r => r.status === "غائب").length;
  const totalLeave   = filtered.filter(r => r.status === "إجازة").length;

  // ─── Excel ───
  function exportCSV() {
    if (filtered.length === 0) { toast("لا توجد بيانات للتصدير", "error"); return; }
    const columns = [
      { key: "name",       header: "الاسم",            width: 22 },
      { key: "date",       header: "التاريخ",           width: 14 },
      { key: "day",        header: "اليوم",             width: 12 },
      { key: "checkIn",    header: "الحضور",            width: 10 },
      { key: "checkOut",   header: "الانصراف",          width: 10 },
      { key: "workHours",  header: "ساعات العمل",       width: 14 },
      { key: "lateMinutes",header: "التأخير (دقيقة)",   width: 14 },
      { key: "status",     header: "الحالة",            width: 12 },
    ];
    const rows = filtered.map(r => ({
      name:        getEmpName(r.employeeId),
      date:        r.date,
      day:         dayNameAr(r.date),
      checkIn:     r.checkIn || "-",
      checkOut:    r.checkOut || "-",
      workHours:   calcWorkHours(r.checkIn, r.checkOut),
      lateMinutes: r.lateMinutes || 0,
      status:      r.status,
    }));
    exportExcel({
      title: "سجل الحضور والانصراف",
      subtitle: `من ${filterFrom || "البداية"} إلى ${filterTo || "النهاية"}`,
      columns, rows,
      summaryCards: [
        { label: "إجمالي السجلات", value: rows.length },
        { label: "حاضر",  value: totalPresent },
        { label: "متأخر", value: totalLate },
        { label: "غائب",  value: totalAbsent },
      ],
      filename: `سجل_الحضور_${getToday()}.xlsx`,
      sheetName: "سجل الحضور",
      companyName: settings?.companyName,
    });
    toast("✅ تم تصدير ملف Excel");
  }

  // ─── PDF (نافذة طباعة) ───
  function printPDF() {
    if (filtered.length === 0) { toast("لا توجد بيانات للطباعة", "error"); return; }
    const columns = [
      { key: "name",       header: "الاسم" },
      { key: "date",       header: "التاريخ" },
      { key: "day",        header: "اليوم" },
      { key: "checkIn",    header: "الحضور" },
      { key: "checkOut",   header: "الانصراف" },
      { key: "workHours",  header: "ساعات العمل" },
      { key: "lateMinutes",header: "التأخير" },
      { key: "status",     header: "الحالة" },
    ];
    const rows = filtered.map(r => ({
      name:        getEmpName(r.employeeId),
      date:        r.date,
      day:         dayNameAr(r.date),
      checkIn:     r.checkIn || "—",
      checkOut:    r.checkOut || "—",
      workHours:   calcWorkHours(r.checkIn, r.checkOut),
      lateMinutes: r.lateMinutes > 0 ? `${r.lateMinutes} د` : "—",
      status:      r.status,
    }));
    exportPDF({
      title: "سجل الحضور والانصراف",
      subtitle: `من ${filterFrom || "البداية"} إلى ${filterTo || "النهاية"} — ${rows.length} سجل`,
      columns, rows,
      summaryCards: [
        { label: "إجمالي السجلات", value: filtered.length, bg: COLORS.light,  color: COLORS.navy,   border: COLORS.navy },
        { label: "حاضر",           value: totalPresent,    bg: COLORS.mint,   color: COLORS.green,  border: COLORS.green },
        { label: "متأخر",          value: totalLate,       bg: COLORS.yellow, color: COLORS.orange, border: COLORS.orange },
        { label: "غائب",           value: totalAbsent,     bg: COLORS.rose,   color: COLORS.red,    border: COLORS.red },
      ],
      filename: `سجل_الحضور_${getToday()}.pdf`,
      companyName: settings?.companyName,
      companyLogo: settings?.companyLogo,
    });
    toast("✅ تم فتح نافذة الطباعة");
  }

  // ─── حفظ HTML بنفس شكل البرنامج ───
  function exportHTML() {
    if (filtered.length === 0) { toast("لا توجد بيانات للتصدير", "error"); return; }

    const companyName = settings?.companyName || "نظام الحضور والانصراف";
    const companyLogo = settings?.companyLogo || null;
    const subtitle    = filterFrom || filterTo
      ? `الفترة: ${filterFrom || "البداية"} — ${filterTo || "النهاية"}`
      : `تاريخ التصدير: ${new Date().toLocaleDateString("ar-EG")}`;

    const statusBadge = (s) => {
      const map = {
        "حاضر":    "background:#dcfce7;color:#16a34a;",
        "متأخر":   "background:#fef9c3;color:#d97706;",
        "غائب":    "background:#fee2e2;color:#dc2626;",
        "إجازة":   "background:#e0f2fe;color:#0891b2;",
        "مأمورية": "background:#f5f3ff;color:#7c3aed;",
      };
      return `<span style="display:inline-block;padding:3px 12px;border-radius:20px;font-size:12px;font-weight:700;${map[s]||"background:#f1f5f9;color:#64748b;"}">${s}</span>`;
    };

    const tableRows = filtered.map((r, i) => {
      const empName = getEmpName(r.employeeId);
      const bg = i % 2 === 0 ? "#f8fafc" : "#ffffff";
      const lateStyle = r.lateMinutes > 0 ? "color:#d97706;font-weight:700;" : "color:#94a3b8;";
      return `
      <tr style="background:${bg};">
        <td style="padding:11px 14px;font-weight:700;color:#1e293b;">${empName}</td>
        <td style="padding:11px 14px;color:#475569;font-size:13px;">${r.date}</td>
        <td style="padding:11px 14px;color:#475569;font-size:13px;">${dayNameAr(r.date)}</td>
        <td style="padding:11px 14px;color:#059669;font-weight:700;">${r.checkIn || "—"}</td>
