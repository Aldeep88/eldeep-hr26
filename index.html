// ══════════════════════════════════════════════
//  TAB: MONTHLY REPORT
// ══════════════════════════════════════════════
function TabMonthlyReport({ employees, records, settings, toast, shifts, branches }) {
  const [selEmp, setSelEmp] = useState("");
  const [selMonth, setSelMonth] = useState(String(new Date().getMonth() + 1).padStart(2, "0"));
  const [selYear, setSelYear] = useState(String(new Date().getFullYear()));
  const [report, setReport] = useState(null);
  const [filterBranch, setFilterBranch] = useState("all");

  const months = ["يناير","فبراير","مارس","أبريل","مايو","يونيو","يوليو","أغسطس","سبتمبر","أكتوبر","نوفمبر","ديسمبر"];
  const years = ["2024", "2025", "2026", "2027"];

  // موظفين مفلترين بالفرع
  const filteredEmps = filterBranch === "all"
    ? employees
    : employees.filter(e => e.branchId === filterBranch);

  function generateReport() {
    if (!selEmp) { toast("اختر موظفاً أولاً", "error"); return; }
    const emp = employees.find(e => e.id === selEmp);
    const empShift = shifts?.find(s => s.id === emp?.shiftId);
    const shiftStart = empShift?.start || settings.workStart;
    const shiftEnd = empShift?.end || settings.workEnd;
    const tolerance = empShift ? Number(empShift.tolerance) : Number(settings.lateTolerance);
    const prefix = `${selYear}-${selMonth}`;
    const daysInMonth = new Date(Number(selYear), Number(selMonth), 0).getDate();
    const rows = [];
    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = `${prefix}-${String(d).padStart(2, "0")}`;
      const dayOfWeek = new Date(dateStr + "T00:00:00").getDay();
      if (dayOfWeek === 5 || dayOfWeek === 6) continue;
      const rec = records.find(r => r.employeeId === selEmp && r.date === dateStr);
      const late = rec ? calcLateMinutes(rec.checkIn, shiftStart, tolerance) : 0;
      rows.push({
        date: dateStr,
        day: dayNameAr(dateStr),
        checkIn: rec?.checkIn || null,
        checkOut: rec?.checkOut || null,
        workHours: rec ? calcWorkHours(rec.checkIn, rec.checkOut) : "-",
        lateMinutes: late,
        status: rec ? (late > 0 ? "متأخر" : "حاضر") : "غائب",
      });
    }
    const present = rows.filter(r => r.status !== "غائب").length;
    const absent = rows.filter(r => r.status === "غائب").length;
    const late = rows.filter(r => r.status === "متأخر").length;
    const totalLateMin = rows.reduce((a, r) => a + r.lateMinutes, 0);
    const totalHoursMin = rows.reduce((a, r) => {
      if (!r.checkIn || !r.checkOut) return a;
      const [ih, im] = r.checkIn.split(":").map(Number);
      const [oh, om] = r.checkOut.split(":").map(Number);
      let diff = (oh * 60 + om) - (ih * 60 + im);
      if (diff <= 0) diff += 24 * 60; // شيفت يعدي منتصف الليل
      if (diff > 24 * 60) return a;   // بيانات غلط — نتجاهلها
      return a + diff;
    }, 0);
    const attendanceRate = rows.length > 0 ? Math.round((present / rows.length) * 100) : 0;
    setReport({
      emp, empShift, rows, present, absent, late, totalLateMin,
      totalHours: Math.floor(totalHoursMin / 60), totalMin: totalHoursMin % 60,
      attendanceRate, month: months[Number(selMonth) - 1], year: selYear,
      shiftStart, shiftEnd, tolerance,
    });
  }

  function exportReport() {
    if (!report) return;
    const columns = [
      { key: "date",       header: "التاريخ",         width: 14 },
      { key: "day",        header: "اليوم",           width: 12 },
      { key: "checkIn",    header: "الحضور",          width: 10 },
      { key: "checkOut",   header: "الانصراف",        width: 10 },
      { key: "workHours",  header: "ساعات العمل",     width: 14 },
      { key: "lateMinutes",header: "التأخير (دقيقة)", width: 14 },
      { key: "status",     header: "الحالة",          width: 12 },
    ];
    const rows = report.rows.map(r => ({
      date:        r.date,
      day:         r.day,
      checkIn:     r.checkIn || "-",
      checkOut:    r.checkOut || "-",
      workHours:   r.workHours,
      lateMinutes: r.lateMinutes || 0,
      status:      r.status,
    }));
    exportExcel({
      title: `تقرير شهري — ${report.emp.name}`,
      subtitle: `${report.month} ${report.year} | ${report.empShift ? report.empShift.name : ""} | دوام ${report.shiftStart}–${report.shiftEnd} | سماح ${report.tolerance}د`,
      columns, rows,
      summaryCards: [
        { label: "أيام الحضور",  value: report.present },
        { label: "أيام الغياب",  value: report.absent },
        { label: "أيام التأخير", value: report.late },
        { label: "إجمالي التأخير", value: `${report.totalLateMin}د` },
        { label: "إجمالي الساعات", value: `${report.totalHours}س ${report.totalMin}د` },
        { label: "نسبة الانتظام", value: `${report.attendanceRate}%` },
      ],
      filename: `تقرير_${report.emp.name}_${report.month}_${report.year}.xlsx`,
      sheetName: report.month,
    });
    toast("✅ تم تصدير Excel الملون");
  }

  function printReport() {
    if (!report) return;
    const columns = [
      { key: "date",       header: "التاريخ" },
      { key: "day",        header: "اليوم" },
      { key: "checkIn",    header: "الحضور" },
      { key: "checkOut",   header: "الانصراف" },
      { key: "workHours",  header: "ساعات العمل" },
      { key: "lateMinutes",header: "التأخير" },
      { key: "status",     header: "الحالة" },
    ];
    const rows = report.rows.map(r => ({
      date:        r.date,
      day:         r.day,
      checkIn:     r.checkIn || "—",
      checkOut:    r.checkOut || "—",
      workHours:   r.workHours,
      lateMinutes: r.lateMinutes > 0 ? `${r.lateMinutes} د` : "—",
      status:      r.status,
    }));
    exportPDF({
      title: `تقرير شهري — ${report.emp.name}`,
      subtitle: `${report.month} ${report.year}  |  ${report.empShift ? report.empShift.name : ""}  |  دوام ${report.shiftStart}–${report.shiftEnd}  |  سماح ${report.tolerance}د`,
      columns, rows,
      summaryCards: [
        { label: "أيام الحضور",    value: report.present,         bg: COLORS.mint,   color: COLORS.green,  border: COLORS.green },
        { label: "أيام الغياب",    value: report.absent,          bg: COLORS.rose,   color: COLORS.red,    border: COLORS.red },
        { label: "أيام التأخير",   value: report.late,            bg: COLORS.yellow, color: COLORS.orange, border: COLORS.orange },
        { label: "إجمالي التأخير", value: `${report.totalLateMin}د`, bg: [245,243,255], color: COLORS.purple, border: COLORS.purple },
        { label: "إجمالي الساعات", value: `${report.totalHours}س`,  bg: COLORS.altRow, color: COLORS.navy,   border: COLORS.navy },
        { label: "نسبة الانتظام",  value: `${report.attendanceRate}%`, bg: COLORS.light, color: COLORS.cyan, border: COLORS.cyan },
      ],
      filename: `تقرير_${report.emp.name}_${report.month}_${report.year}.pdf`,
      companyName: settings?.companyName,
      companyLogo: settings?.companyLogo,
    });
    toast("✅ تم فتح نافذة الطباعة");
  }

  const statusStyle = (s) => ({
    padding: "2px 8px", borderRadius: 20, fontSize: 11, fontWeight: "700",
    background: s === "حاضر" ? "#f0fdf4" : s === "متأخر" ? "#fffbeb" : "#fef2f2",
    color: s === "حاضر" ? "#16a34a" : s === "متأخر" ? "#d97706" : "#dc2626",
  });

  return (
    <div>
      <h2 style={{ margin: "0 0 20px", color: "#1e3a5f", fontSize: 20, fontWeight: "800" }}>📈 التقرير الشهري للموظف</h2>

      <div style={{ background: "white", borderRadius: 14, padding: 20, marginBottom: 20, boxShadow: "0 2px 10px rgba(0,0,0,0.06)" }}>
        <div style={{ display: "flex", gap: 12, flexWrap: "wrap", alignItems: "flex-end" }}>
          {branches && branches.length > 0 && (
            <div>
              <label style={{ display: "block", marginBottom: 5, fontSize: 13, fontWeight: "700", color: "#374151" }}>الفرع</label>
              <select value={filterBranch} onChange={e => { setFilterBranch(e.target.value); setSelEmp(""); setReport(null); }}
                style={{ padding: "9px 12px", border: "2px solid #e2e8f0", borderRadius: 8, fontSize: 14, fontFamily: "Cairo, Arial", minWidth: 150, background: filterBranch !== "all" ? "#eff6ff" : "white", borderColor: filterBranch !== "all" ? "#2563a8" : "#e2e8f0" }}>
                <option value="all">🏪 كل الفروع</option>
                {branches.map(b => <option key={b.id} value={b.id}>🏪 {b.name}</option>)}
              </select>
            </div>
          )}
          <div>
            <label style={{ display: "block", marginBottom: 5, fontSize: 13, fontWeight: "700", color: "#374151" }}>اختر الموظف</label>
            <select value={selEmp} onChange={e => setSelEmp(e.target.value)}
              style={{ padding: "9px 12px", border: "2px solid #e2e8f0", borderRadius: 8, fontSize: 14, fontFamily: "Cairo, Arial", minWidth: 200 }}>
              <option value="">— اختر موظفاً —</option>
              {filteredEmps.map(e => {
                const sh = shifts?.find(s => s.id === e.shiftId);
                return <option key={e.id} value={e.id}>{e.name}{sh ? ` — ${sh.name}` : ""}</option>;
              })}
            </select>
          </div>
          <div>
            <label style={{ display: "block", marginBottom: 5, fontSize: 13, fontWeight: "700", color: "#374151" }}>الشهر</label>
            <select value={selMonth} onChange={e => setSelMonth(e.target.value)}
              style={{ padding: "9px 12px", border: "2px solid #e2e8f0", borderRadius: 8, fontSize: 14, fontFamily: "Cairo, Arial" }}>
              {months.map((m, i) => <option key={i} value={String(i + 1).padStart(2, "0")}>{m}</option>)}
            </select>
          </div>
          <div>
            <label style={{ display: "block", marginBottom: 5, fontSize: 13, fontWeight: "700", color: "#374151" }}>السنة</label>
            <select value={selYear} onChange={e => setSelYear(e.target.value)}
              style={{ padding: "9px 12px", border: "2px solid #e2e8f0", borderRadius: 8, fontSize: 14, fontFamily: "Cairo, Arial" }}>
              {years.map(y => <option key={y} value={y}>{y}</option>)}
            </select>
          </div>
          <button onClick={generateReport} style={{ padding: "10px 20px", background: "#1e3a5f", color: "white", border: "none", borderRadius: 8, fontWeight: "700", cursor: "pointer", fontSize: 14, fontFamily: "Cairo, Arial" }}>
            🔍 عرض التقرير
          </button>
        </div>
      </div>

      {report && (
        <div>
          {/* Summary Cards */}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(130px, 1fr))", gap: 10, marginBottom: 16 }}>
            {[
              { label: "أيام الحضور", val: report.present, color: "#16a34a", icon: "✅" },
              { label: "أيام الغياب", val: report.absent, color: "#dc2626", icon: "❌" },
              { label: "أيام التأخير", val: report.late, color: "#d97706", icon: "⚠️" },
              { label: "إجمالي التأخير", val: `${report.totalLateMin}د`, color: "#9333ea", icon: "⏰" },
              { label: "إجمالي الساعات", val: `${report.totalHours}س`, color: "#2563a8", icon: "🕐" },
              { label: "نسبة الانتظام", val: `${report.attendanceRate}%`, color: "#0891b2", icon: "📊" },
            ].map((s, i) => (
              <div key={i} style={{ background: "white", borderRadius: 10, padding: "14px 12px", textAlign: "center", boxShadow: "0 2px 8px rgba(0,0,0,0.06)", borderBottom: `3px solid ${s.color}` }}>
                <div style={{ fontSize: 22, marginBottom: 4 }}>{s.icon}</div>
                <div style={{ fontSize: 22, fontWeight: "800", color: s.color }}>{s.val}</div>
                <div style={{ fontSize: 11, color: "#64748b", fontWeight: "600" }}>{s.label}</div>
              </div>
            ))}
          </div>

          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12, flexWrap: "wrap", gap: 8 }}>
            <div>
              <h3 style={{ margin: "0 0 4px", color: "#1e3a5f", fontSize: 16 }}>
                تقرير: <strong>{report.emp.name}</strong> — {report.month} {report.year}
              </h3>
              {report.empShift && (
                <div style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 12, color: "#64748b" }}>
                  <span style={{ background: `${report.empShift.color}20`, color: report.empShift.color, padding: "2px 10px", borderRadius: 10, fontWeight: "700" }}>
                    {report.empShift.name}
                  </span>
                  <span>🕐 {report.shiftStart} – {report.shiftEnd}</span>
                  <span>⏱️ سماح {report.tolerance} دقيقة</span>
                </div>
              )}
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              <button onClick={exportReport} style={{ padding: "7px 14px", background: "#16a34a", color: "white", border: "none", borderRadius: 8, fontWeight: "700", cursor: "pointer", fontSize: 13, fontFamily: "Cairo, Arial" }}>📥 Excel</button>
              <button onClick={printReport} style={{ padding: "7px 14px", background: "#dc2626", color: "white", border: "none", borderRadius: 8, fontWeight: "700", cursor: "pointer", fontSize: 13, fontFamily: "Cairo, Arial" }}>🖨️ PDF</button>
            </div>
          </div>

          <div style={{ background: "white", borderRadius: 14, overflow: "hidden", boxShadow: "0 2px 10px rgba(0,0,0,0.06)" }}>
            <div style={{ overflowX: "auto" }}>
              <table style={{ width: "100%", borderCollapse: "collapse", fontFamily: "Cairo, Arial" }}>
                <thead>
                  <tr style={{ background: "#1e3a5f", color: "white" }}>
                    {["التاريخ", "اليوم", "الحضور", "الانصراف", "ساعات العمل", "التأخير", "الحالة"].map(h => (
                      <th key={h} style={{ padding: "11px 12px", textAlign: "right", fontSize: 13, fontWeight: "700" }}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {report.rows.map((r, i) => (
                    <tr key={r.date} style={{ background: r.status === "غائب" ? "#fff5f5" : i % 2 === 0 ? "#f8fafc" : "white" }}>
                      <td style={{ padding: "10px 12px", fontSize: 13, color: "#475569" }}>{r.date}</td>
                      <td style={{ padding: "10px 12px", fontSize: 13, color: "#475569" }}>{r.day}</td>
                      <td style={{ padding: "10px 12px", fontWeight: "700", color: "#059669" }}>{r.checkIn || "—"}</td>
                      <td style={{ padding: "10px 12px", fontWeight: "700", color: "#dc2626" }}>{r.checkOut || "—"}</td>
                      <td style={{ padding: "10px 12px", fontWeight: "700", color: "#2563a8" }}>{r.workHours}</td>
                      <td style={{ padding: "10px 12px", fontSize: 13, color: r.lateMinutes > 0 ? "#d97706" : "#94a3b8", fontWeight: "700" }}>
                        {r.lateMinutes > 0 ? `${r.lateMinutes} دقيقة` : "—"}
                      </td>
                      <td style={{ padding: "10px 12px" }}><span style={statusStyle(r.status)}>{r.status}</span></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════
//  TAB: STATISTICS
// ══════════════════════════════════════════════
function TabStatistics({ employees, records, settings, branches }) {
  const today = getToday();
  const todayRecs = records.filter(r => r.date === today);
  const presentToday = todayRecs.length;
  const absentToday = employees.length - presentToday;
  const lateToday = todayRecs.filter(r => r.status === "متأخر").length;
  const checkedOut = todayRecs.filter(r => r.checkOut).length;

  // Last 7 days bar chart data
  const last7 = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const ds = d.toISOString().split("T")[0];
    const dayRecs = records.filter(r => r.date === ds);
    last7.push({
      date: ds,
      label: ["أحد","اثن","ثلا","أرب","خمس","جمع","سبت"][d.getDay()],
      present: dayRecs.filter(r => r.status === "حاضر").length,
      late: dayRecs.filter(r => r.status === "متأخر").length,
      absent: employees.length - dayRecs.length,
    });
  }
  const maxBar = Math.max(...last7.map(d => d.present + d.late + d.absent), 1);

  // Dept breakdown
  const depts = {};
  employees.forEach(e => { depts[e.department || "غير محدد"] = (depts[e.department || "غير محدد"] || 0) + 1; });

  // Branch breakdown stats
  const branchStats = (branches || []).map(b => {
    const branchEmps = employees.filter(e => e.branchId === b.id);
    const branchTodayRecs = records.filter(r => r.date === today && branchEmps.some(e => e.id === r.employeeId));
    const present = branchTodayRecs.filter(r => r.status === "حاضر" || r.status === "متأخر").length;
    const absent = branchEmps.length - branchTodayRecs.length;
    const late = branchTodayRecs.filter(r => r.status === "متأخر").length;
    const rate = branchEmps.length > 0 ? Math.round((present / branchEmps.length) * 100) : 0;
    return { ...b, empCount: branchEmps.length, present, absent, late, rate };
  });
  const unassignedEmps = employees.filter(e => !e.branchId || !(branches || []).find(b => b.id === e.branchId));

  // Top punctual employees this month
  const monthPrefix = today.slice(0, 7);
  const empStats = employees.map(e => {
    const mRecs = records.filter(r => r.employeeId === e.id && r.date.startsWith(monthPrefix));
    const present = mRecs.filter(r => r.status !== "غائب").length;
    const late = mRecs.filter(r => r.status === "متأخر").length;
    const totalLate = mRecs.reduce((a, r) => a + (r.lateMinutes || 0), 0);
    return { ...e, present, late, totalLate, rate: mRecs.length > 0 ? Math.round((present / mRecs.length) * 100) : 0 };
  }).sort((a, b) => b.rate - a.rate);

  const statCard = (icon, label, val, color, sub) => (
    <div style={{ background: "white", borderRadius: 14, padding: "20px 18px", boxShadow: "0 2px 10px rgba(0,0,0,0.06)", borderBottom: `4px solid ${color}` }}>
      <div style={{ fontSize: 30, marginBottom: 8 }}>{icon}</div>
      <div style={{ fontSize: 32, fontWeight: "800", color }}>{val}</div>
      <div style={{ fontSize: 13, color: "#64748b", fontWeight: "700", marginTop: 2 }}>{label}</div>
      {sub && <div style={{ fontSize: 11, color: "#94a3b8", marginTop: 4 }}>{sub}</div>}
    </div>
  );

  return (
    <div>
      <h2 style={{ margin: "0 0 20px", color: "#1e3a5f", fontSize: 20, fontWeight: "800" }}>📊 الإحصائيات والتقارير</h2>

      {/* Today Cards */}
      <div style={{ marginBottom: 6 }}>
        <h3 style={{ margin: "0 0 12px", color: "#475569", fontSize: 14, fontWeight: "700", textTransform: "uppercase", letterSpacing: 1 }}>اليوم — {today}</h3>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(150px,1fr))", gap: 12, marginBottom: 24 }}>
        {statCard("✅", "حاضر اليوم", presentToday, "#16a34a", `من أصل ${employees.length} موظف`)}
        {statCard("❌", "غائب اليوم", absentToday, "#dc2626")}
        {statCard("⚠️", "متأخر اليوم", lateToday, "#d97706")}
        {statCard("🚪", "انصرف", checkedOut, "#7c3aed", "أكمل يوم العمل")}
      </div>

      {/* Bar Chart — Last 7 Days */}
      <div style={{ background: "white", borderRadius: 14, padding: 24, marginBottom: 20, boxShadow: "0 2px 10px rgba(0,0,0,0.06)" }}>
        <h3 style={{ margin: "0 0 20px", color: "#1e3a5f", fontSize: 16, fontWeight: "800" }}>📅 الحضور — آخر 7 أيام</h3>
        <div style={{ display: "flex", alignItems: "flex-end", gap: 10, height: 180, paddingBottom: 8 }}>
          {last7.map((d, i) => {
            const totalH = 160;
            const pxPerUnit = totalH / maxBar;
            const presentH = Math.max(d.present * pxPerUnit, d.present > 0 ? 4 : 0);
            const lateH = Math.max(d.late * pxPerUnit, d.late > 0 ? 4 : 0);
            const absentH = Math.max(d.absent * pxPerUnit, d.absent > 0 ? 4 : 0);
            const isToday = d.date === today;
            return (
              <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 0 }}>
                <div style={{ fontSize: 10, color: "#94a3b8", marginBottom: 4, fontWeight: "600" }}>
                  {d.present + d.late > 0 ? d.present + d.late : ""}
                </div>
                <div style={{ width: "100%", display: "flex", flexDirection: "column", alignItems: "stretch", borderRadius: 6, overflow: "hidden", border: isToday ? "2px solid #2563a8" : "none" }}>
                  {absentH > 0 && <div style={{ height: absentH, background: "#fee2e2", transition: "height 0.5s" }} title={`غائب: ${d.absent}`} />}
                  {lateH > 0 && <div style={{ height: lateH, background: "#fde68a", transition: "height 0.5s" }} title={`متأخر: ${d.late}`} />}
                  {presentH > 0 && <div style={{ height: presentH, background: isToday ? "#1e3a5f" : "#3b82f6", transition: "height 0.5s" }} title={`حاضر: ${d.present}`} />}
                  {(d.present + d.late + d.absent) === 0 && <div style={{ height: 6, background: "#f1f5f9" }} />}
                </div>
                <div style={{ fontSize: 11, color: isToday ? "#1e3a5f" : "#64748b", marginTop: 6, fontWeight: isToday ? "800" : "600" }}>{d.label}</div>
              </div>
            );
          })}
        </div>
        {/* Legend */}
        <div style={{ display: "flex", gap: 16, marginTop: 8, justifyContent: "center", flexWrap: "wrap" }}>
          {[["#3b82f6","حاضر"], ["#fde68a","متأخر"], ["#fee2e2","غائب"]].map(([c, l]) => (
            <div key={l} style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 12, color: "#475569" }}>
              <div style={{ width: 12, height: 12, borderRadius: 3, background: c }} />{l}
            </div>
          ))}
        </div>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20, marginBottom: 20 }}>
        {/* Dept Breakdown */}
        <div style={{ background: "white", borderRadius: 14, padding: 20, boxShadow: "0 2px 10px rgba(0,0,0,0.06)" }}>
          <h3 style={{ margin: "0 0 16px", color: "#1e3a5f", fontSize: 15, fontWeight: "800" }}>🏢 توزيع الأقسام</h3>
          {Object.entries(depts).map(([dept, count], i) => {
            const pct = Math.round((count / employees.length) * 100);
            const colors = ["#3b82f6","#10b981","#f59e0b","#ef4444","#8b5cf6","#06b6d4"];
            return (
              <div key={dept} style={{ marginBottom: 12 }}>
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                  <span style={{ fontSize: 13, color: "#374151", fontWeight: "700" }}>{dept}</span>
                  <span style={{ fontSize: 13, color: "#64748b", fontWeight: "600" }}>{count} موظف ({pct}%)</span>
                </div>
                <div style={{ height: 8, background: "#f1f5f9", borderRadius: 99, overflow: "hidden" }}>
                  <div style={{ height: "100%", width: `${pct}%`, background: colors[i % colors.length], borderRadius: 99, transition: "width 0.6s" }} />
                </div>
              </div>
            );
          })}
          {Object.keys(depts).length === 0 && <p style={{ color: "#94a3b8", fontSize: 13 }}>لا يوجد موظفين</p>}
        </div>

        {/* Attendance Rate This Month */}
        <div style={{ background: "white", borderRadius: 14, padding: 20, boxShadow: "0 2px 10px rgba(0,0,0,0.06)" }}>
          <h3 style={{ margin: "0 0 16px", color: "#1e3a5f", fontSize: 15, fontWeight: "800" }}>🏆 الانتظام هذا الشهر</h3>
          {empStats.length === 0 && <p style={{ color: "#94a3b8", fontSize: 13 }}>لا توجد بيانات</p>}
          {empStats.map((e, i) => (
            <div key={e.id} style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
              <div style={{ width: 28, height: 28, borderRadius: "50%", background: i === 0 ? "#fbbf24" : i === 1 ? "#94a3b8" : i === 2 ? "#d97706" : "#e2e8f0", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, fontWeight: "800", color: i < 3 ? "white" : "#64748b", flexShrink: 0 }}>
                {i < 3 ? ["🥇","🥈","🥉"][i] : i + 1}
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}>
                  <span style={{ fontSize: 13, fontWeight: "700", color: "#1e293b" }}>{e.name}</span>
                  <span style={{ fontSize: 13, fontWeight: "800", color: e.rate >= 90 ? "#16a34a" : e.rate >= 70 ? "#d97706" : "#dc2626" }}>{e.rate}%</span>
                </div>
                <div style={{ height: 6, background: "#f1f5f9", borderRadius: 99, overflow: "hidden" }}>
                  <div style={{ height: "100%", width: `${e.rate}%`, background: e.rate >= 90 ? "#16a34a" : e.rate >= 70 ? "#d97706" : "#dc2626", borderRadius: 99, transition: "width 0.6s" }} />
                </div>
                <div style={{ fontSize: 10, color: "#94a3b8", marginTop: 2 }}>حضر {e.present} يوم — تأخر {e.totalLate} دقيقة</div>
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* Branches Breakdown — يظهر بس لما في فروع */}
      {branchStats.length > 0 && (
        <div style={{ background: "white", borderRadius: 14, padding: 20, marginBottom: 20, boxShadow: "0 2px 10px rgba(0,0,0,0.06)" }}>
          <h3 style={{ margin: "0 0 16px", color: "#1e3a5f", fontSize: 15, fontWeight: "800" }}>🏪 حضور الفروع — اليوم</h3>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(260px,1fr))", gap: 14 }}>
            {branchStats.map((b, i) => {
              const branchColors = ["#2563a8","#16a34a","#d97706","#7c3aed","#0891b2","#dc2626"];
              const col = branchColors[i % branchColors.length];
              return (
                <div key={b.id} style={{ border: `2px solid ${col}20`, borderRadius: 12, padding: "16px 14px", background: `${col}06` }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                    <div style={{ fontWeight: "800", fontSize: 14, color: "#1e293b" }}>🏪 {b.name}</div>
                    <span style={{ fontSize: 13, fontWeight: "800", color: b.rate >= 80 ? "#16a34a" : b.rate >= 50 ? "#d97706" : "#dc2626" }}>{b.rate}%</span>
                  </div>
                  <div style={{ height: 8, background: "#f1f5f9", borderRadius: 99, overflow: "hidden", marginBottom: 10 }}>
                    <div style={{ height: "100%", width: `${b.rate}%`, background: col, borderRadius: 99, transition: "width 0.6s" }} />
                  </div>
                  <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
                    <span style={{ fontSize: 12, fontWeight: "700", color: "#16a34a" }}>✅ {b.present} حاضر</span>
                    <span style={{ fontSize: 12, fontWeight: "700", color: "#d97706" }}>⚠️ {b.late} متأخر</span>
                    <span style={{ fontSize: 12, fontWeight: "700", color: "#dc2626" }}>❌ {b.absent} غائب</span>
                    <span style={{ fontSize: 12, color: "#64748b", marginRight: "auto" }}>👥 {b.empCount} موظف</span>
                  </div>
                </div>
              );
            })}
            {unassignedEmps.length > 0 && (
              <div style={{ border: "2px solid #e2e8f0", borderRadius: 12, padding: "16px 14px", background: "#f8fafc" }}>
                <div style={{ fontWeight: "800", fontSize: 14, color: "#64748b", marginBottom: 8 }}>👤 بدون فرع</div>
                <div style={{ fontSize: 12, color: "#94a3b8", fontWeight: "600" }}>{unassignedEmps.length} موظف غير مخصصين لفرع</div>
              </div>
            )}
          </div>
        </div>
      )}

      {/* Weekly Summary Table */}
      <div style={{ background: "white", borderRadius: 14, overflow: "hidden", boxShadow: "0 2px 10px rgba(0,0,0,0.06)" }}>
        <div style={{ padding: "16px 20px", borderBottom: "1px solid #f1f5f9" }}>
          <h3 style={{ margin: 0, color: "#1e3a5f", fontSize: 15, fontWeight: "800" }}>📋 ملخص آخر 7 أيام</h3>
        </div>
        <div style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontFamily: "Cairo, Arial" }}>
            <thead>
              <tr style={{ background: "#1e3a5f", color: "white" }}>
                {["التاريخ", "اليوم", "حاضر", "متأخر", "غائب", "نسبة الحضور"].map(h => (
                  <th key={h} style={{ padding: "11px 14px", textAlign: "right", fontSize: 13, fontWeight: "700" }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {[...last7].reverse().map((d, i) => {
                const total = employees.length;
                const rate = total > 0 ? Math.round(((d.present + d.late) / total) * 100) : 0;
                return (
                  <tr key={d.date} style={{ background: d.date === today ? "#eff6ff" : i % 2 === 0 ? "#f8fafc" : "white", fontWeight: d.date === today ? "700" : "400" }}>
                    <td style={{ padding: "11px 14px", fontSize: 13, color: "#475569" }}>
                      {d.date} {d.date === today && <span style={{ background: "#dbeafe", color: "#1d4ed8", fontSize: 10, padding: "1px 6px", borderRadius: 10, marginRight: 4 }}>اليوم</span>}
                    </td>
                    <td style={{ padding: "11px 14px", fontSize: 13, color: "#475569" }}>{d.label}</td>
                    <td style={{ padding: "11px 14px" }}><span style={{ background: "#f0fdf4", color: "#16a34a", padding: "2px 8px", borderRadius: 20, fontSize: 12, fontWeight: "700" }}>{d.present}</span></td>
                    <td style={{ padding: "11px 14px" }}><span style={{ background: "#fffbeb", color: "#d97706", padding: "2px 8px", borderRadius: 20, fontSize: 12, fontWeight: "700" }}>{d.late}</span></td>
                    <td style={{ padding: "11px 14px" }}><span style={{ background: "#fef2f2", color: "#dc2626", padding: "2px 8px", borderRadius: 20, fontSize: 12, fontWeight: "700" }}>{d.absent}</span></td>
                    <td style={{ padding: "11px 14px" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                        <div style={{ flex: 1, height: 8, background: "#f1f5f9", borderRadius: 99, overflow: "hidden", minWidth: 60 }}>
                          <div style={{ height: "100%", width: `${rate}%`, background: rate >= 80 ? "#16a34a" : rate >= 50 ? "#d97706" : "#dc2626", borderRadius: 99 }} />
                        </div>
                        <span style={{ fontSize: 12, fontWeight: "700", color: rate >= 80 ? "#16a34a" : rate >= 50 ? "#d97706" : "#dc2626", minWidth: 36 }}>{rate}%</span>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════
//  TAB: SETTINGS & BACKUP
// ══════════════════════════════════════════════
function TabSettings({ settings, setSettings, employees, setEmployees, records, setRecords, toast, shifts, setShifts }) {
  const [form, setForm] = useState({ ...settings });
  const [shiftModal, setShiftModal] = useState(null); // null | "add" | shiftObj
  const [shiftForm, setShiftForm] = useState({ name: "", start: "09:00", end: "17:00", tolerance: 15, color: "#2563a8" });
  const [clearModal, setClearModal] = useState(false);
  const [clearConfirmText, setClearConfirmText] = useState("");
  const set = (k, v) => setForm(p => ({ ...p, [k]: v }));
  const setSF = (k, v) => setShiftForm(p => ({ ...p, [k]: v }));

  const SHIFT_COLORS = ["#2563a8","#7c3aed","#059669","#dc2626","#d97706","#0891b2","#be185d"];
  const CLEAR_KEYWORD = "امسح كل شيء";

  function saveSettings() { setSettings(form); toast("✅ تم حفظ الإعدادات"); }

  async function clearAllData() {
    Object.values(KEYS).forEach(k => localStorage.removeItem(k));
    const db = window.__fsdb;
    if (db) {
      try {
        const batch = db.batch();
        for (const col of ["employees","records","settings","shifts"]) {
          const snap = await db.collection(col).get();
          snap.docs.forEach(d => batch.delete(d.ref));
        }
        await batch.commit();
      } catch(e) {}
    }
    toast("🗑️ تم مسح كل البيانات — جاري إعادة التشغيل...", "error");
    setTimeout(() => window.location.reload(), 1800);
  }

  function openAddShift() {
    setShiftForm({ name: "", start: "09:00", end: "17:00", tolerance: 15, color: "#2563a8" });
    setShiftModal("add");
  }

  function openEditShift(sh) {
    setShiftForm({ ...sh });
    setShiftModal(sh);
  }

  function saveShift() {
    if (!shiftForm.name || !shiftForm.start || !shiftForm.end) { toast("اسم الشيفت ووقت البداية والنهاية مطلوبين", "error"); return; }
    if (shiftModal === "add") {
      setShifts(p => [...p, { ...shiftForm, id: generateId(), tolerance: Number(shiftForm.tolerance) }]);
      toast("✅ تم إضافة الشيفت");
    } else {
      setShifts(p => p.map(s => s.id === shiftModal.id ? { ...s, ...shiftForm, tolerance: Number(shiftForm.tolerance) } : s));
      toast("✅ تم تعديل الشيفت");
    }
    setShiftModal(null);
  }

  function deleteShift(id) {
    const inUse = employees.some(e => e.shiftId === id);
    if (inUse) { toast("لا يمكن حذف شيفت مخصص لموظفين!", "error"); return; }
    setShifts(p => p.filter(s => s.id !== id));
    toast("🗑️ تم حذف الشيفت", "error");
  }

  function exportBackup() {
    const data = { version: "2.0", exportedAt: new Date().toISOString(), employees, records, settings, shifts };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
    a.download = `backup_firebase_${getToday()}_${getTimeNow().replace(":", "-")}.json`; a.click();
    setSettings(p => ({ ...p, lastBackup: new Date().toISOString() }));
    toast("✅ تم حفظ النسخة الاحتياطية");
  }

  function importBackup(e) {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data.employees || !data.records) { toast("الملف غير صحيح!", "error"); return; }
        if (!window.confirm(`هل تريد استعادة النسخة الاحتياطية؟\nسيتم استبدال البيانات الحالية!`)) return;
        localStorage.setItem(KEYS.employees, JSON.stringify(data.employees));
        localStorage.setItem(KEYS.records, JSON.stringify(data.records));
        if (data.settings) localStorage.setItem(KEYS.settings, JSON.stringify(data.settings));
        if (data.shifts) localStorage.setItem(KEYS.shifts, JSON.stringify(data.shifts));
        toast("✅ تم استعادة البيانات...");
        setTimeout(() => window.location.reload(), 1500);
      } catch { toast("خطأ في قراءة الملف!", "error"); }
    };
    reader.readAsText(file); e.target.value = "";
  }

  function exportAllExcel() {
    const columns = [
      { key: "name",       header: "الاسم الكامل",   width: 22 },
      { key: "username",   header: "اسم المستخدم",   width: 16 },
      { key: "department", header: "القسم",           width: 16 },
      { key: "shift",      header: "الشيفت",          width: 18 },
      { key: "phone",      header: "الموبايل",        width: 16 },
      { key: "createdAt",  header: "تاريخ الإضافة",  width: 14 },
    ];
    const rows = employees.map(e => {
      const sh = shifts.find(s => s.id === e.shiftId);
      return { name: e.name, username: e.username, department: e.department || "-", shift: sh?.name || "-", phone: e.phone || "-", createdAt: e.createdAt };
    });
    exportExcel({
      title: "بيانات الموظفين",
      subtitle: `إجمالي ${employees.length} موظف`,
      columns, rows,
      summaryCards: [
        { label: "إجمالي الموظفين", value: employees.length },
        { label: "عدد الشيفتات", value: shifts.length },
      ],
      filename: `بيانات_الموظفين_${getToday()}.xlsx`,
      sheetName: "الموظفين",
    });
    toast("✅ تم تصدير بيانات الموظفين الملونة");
  }

  return (
    <div>
      {/* Shift Form Modal */}
      {shiftModal && (
        <Modal title={shiftModal === "add" ? "➕ إضافة شيفت جديد" : "✏️ تعديل الشيفت"} onClose={() => setShiftModal(null)}>
          <div style={{ marginBottom: 14 }}>
            <label style={{ display: "block", marginBottom: 5, fontSize: 13, fontWeight: "700", color: "#374151" }}>اسم الشيفت</label>
            <input value={shiftForm.name} onChange={e => setSF("name", e.target.value)} placeholder="مثال: الشيفت الصباحي"
              style={{ width: "100%", padding: "10px 12px", border: "2px solid #e2e8f0", borderRadius: 8, fontSize: 14, fontFamily: "Cairo, Arial" }} />
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 14 }}>
            <div>
              <label style={{ display: "block", marginBottom: 5, fontSize: 13, fontWeight: "700", color: "#374151" }}>وقت البداية</label>
              <input type="time" value={shiftForm.start} onChange={e => setSF("start", e.target.value)}
                style={{ width: "100%", padding: "10px 12px", border: "2px solid #e2e8f0", borderRadius: 8, fontSize: 14, fontFamily: "Cairo, Arial" }} />
            </div>
            <div>
              <label style={{ display: "block", marginBottom: 5, fontSize: 13, fontWeight: "700", color: "#374151" }}>وقت النهاية</label>
              <input type="time" value={shiftForm.end} onChange={e => setSF("end", e.target.value)}
                style={{ width: "100%", padding: "10px 12px", border: "2px solid #e2e8f0", borderRadius: 8, fontSize: 14, fontFamily: "Cairo, Arial" }} />
            </div>
          </div>
          <div style={{ marginBottom: 14 }}>
            <label style={{ display: "block", marginBottom: 5, fontSize: 13, fontWeight: "700", color: "#374151" }}>دقائق السماح بالتأخير</label>
            <input type="number" min="0" max="60" value={shiftForm.tolerance} onChange={e => setSF("tolerance", e.target.value)}
              style={{ width: "100%", padding: "10px 12px", border: "2px solid #e2e8f0", borderRadius: 8, fontSize: 14, fontFamily: "Cairo, Arial" }} />
            <div style={{ fontSize: 11, color: "#94a3b8", marginTop: 4 }}>
              مثال: الدوام {shiftForm.start} + {shiftForm.tolerance} دقيقة سماح = التأخير يُحسب بعد {(() => { try { const [h,m] = shiftForm.start.split(":").map(Number); const tot = h*60+m+Number(shiftForm.tolerance); return `${String(Math.floor(tot/60)).padStart(2,"0")}:${String(tot%60).padStart(2,"0")}`; } catch { return "..."; } })()}
            </div>
          </div>
          <div style={{ marginBottom: 18 }}>
            <label style={{ display: "block", marginBottom: 8, fontSize: 13, fontWeight: "700", color: "#374151" }}>لون الشيفت</label>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
              {SHIFT_COLORS.map(c => (
                <button key={c} onClick={() => setSF("color", c)} style={{
                  width: 32, height: 32, borderRadius: "50%", background: c, border: shiftForm.color === c ? "3px solid #1e293b" : "3px solid transparent",
                  cursor: "pointer", boxShadow: shiftForm.color === c ? "0 0 0 2px white, 0 0 0 4px " + c : "none",
                }} />
              ))}
            </div>
          </div>
          {/* Preview */}
          <div style={{ background: `${shiftForm.color}12`, border: `2px solid ${shiftForm.color}40`, borderRadius: 10, padding: "10px 14px", marginBottom: 16 }}>
            <div style={{ fontWeight: "700", color: shiftForm.color, fontSize: 14 }}>{shiftForm.name || "اسم الشيفت"}</div>
            <div style={{ fontSize: 12, color: "#64748b", marginTop: 2 }}>{shiftForm.start} ← {shiftForm.end} &nbsp;|&nbsp; سماح: {shiftForm.tolerance} دقيقة</div>
          </div>
          <div style={{ display: "flex", gap: 10 }}>
            <button onClick={saveShift} style={{ flex: 1, padding: "11px", background: "#1e3a5f", color: "white", border: "none", borderRadius: 8, fontWeight: "700", cursor: "pointer", fontFamily: "Cairo, Arial" }}>
              {shiftModal === "add" ? "إضافة الشيفت" : "حفظ التعديلات"}
            </button>
            <button onClick={() => setShiftModal(null)} style={{ flex: 1, padding: "11px", background: "#f1f5f9", color: "#64748b", border: "none", borderRadius: 8, fontWeight: "700", cursor: "pointer", fontFamily: "Cairo, Arial" }}>إلغاء</button>
          </div>
        </Modal>
      )}

      <h2 style={{ margin: "0 0 20px", color: "#1e3a5f", fontSize: 20, fontWeight: "800" }}>⚙️ الإعدادات والشيفتات</h2>

      {/* Shifts Management — FULL WIDTH */}
      <div style={{ background: "white", borderRadius: 14, padding: 24, marginBottom: 20, boxShadow: "0 2px 10px rgba(0,0,0,0.06)" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 18 }}>
          <h3 style={{ margin: 0, color: "#1e3a5f", fontSize: 16, fontWeight: "800" }}>🕐 إدارة الشيفتات</h3>
          <button onClick={openAddShift} style={{ padding: "8px 16px", background: "#1e3a5f", color: "white", border: "none", borderRadius: 8, fontWeight: "700", cursor: "pointer", fontSize: 13, fontFamily: "Cairo, Arial" }}>
            ➕ شيفت جديد
          </button>
        </div>
        {shifts.length === 0 ? (
          <div style={{ textAlign: "center", padding: "24px", color: "#94a3b8", fontSize: 14 }}>لا توجد شيفتات — اضغط "شيفت جديد" لإضافة أول شيفت</div>
        ) : (
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px,1fr))", gap: 14 }}>
            {shifts.map(sh => {
              const assigned = employees.filter(e => e.shiftId === sh.id).length;
              return (
                <div key={sh.id} style={{ border: `2px solid ${sh.color}30`, borderRadius: 14, padding: "16px 18px", background: `${sh.color}06`, position: "relative" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
                    <div style={{ width: 14, height: 14, borderRadius: "50%", background: sh.color, flexShrink: 0 }} />
                    <div style={{ fontWeight: "800", fontSize: 15, color: "#1e293b" }}>{sh.name}</div>
                  </div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 12 }}>
                    {[
                      { label: "البداية", val: sh.start, icon: "🟢" },
                      { label: "النهاية", val: sh.end, icon: "🔴" },
                      { label: "السماح", val: `${sh.tolerance}د`, icon: "⏱️" },
                    ].map(s => (
                      <div key={s.label} style={{ background: "white", borderRadius: 8, padding: "8px", textAlign: "center", boxShadow: "0 1px 4px rgba(0,0,0,0.06)" }}>
                        <div style={{ fontSize: 14 }}>{s.icon}</div>
                        <div style={{ fontSize: 14, fontWeight: "800", color: sh.color }}>{s.val}</div>
                        <div style={{ fontSize: 10, color: "#94a3b8", fontWeight: "600" }}>{s.label}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <span style={{ fontSize: 12, color: "#64748b", background: "#f1f5f9", padding: "3px 10px", borderRadius: 20, fontWeight: "600" }}>
                      👥 {assigned} موظف
                    </span>
                    <div style={{ display: "flex", gap: 6 }}>
                      <button onClick={() => openEditShift(sh)} style={{ padding: "5px 10px", background: "#eff6ff", color: "#2563a8", border: "none", borderRadius: 6, cursor: "pointer", fontSize: 12, fontWeight: "700", fontFamily: "Cairo, Arial" }}>✏️ تعديل</button>
                      <button onClick={() => deleteShift(sh.id)} style={{ padding: "5px 10px", background: "#fef2f2", color: "#dc2626", border: "none", borderRadius: 6, cursor: "pointer", fontSize: 12, fontWeight: "700", fontFamily: "Cairo, Arial" }}>🗑️</button>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20 }}>
        {/* General Settings */}
        <div style={{ background: "white", borderRadius: 14, padding: 24, boxShadow: "0 2px 10px rgba(0,0,0,0.06)" }}>
          <h3 style={{ margin: "0 0 18px", color: "#1e3a5f", fontSize: 16, fontWeight: "800" }}>🏢 الإعدادات العامة</h3>
          {[
            { key: "companyName", label: "اسم الشركة", type: "text" },
            { key: "adminUsername", label: "يوزر المدير", type: "text" },
            { key: "adminPassword", label: "باسورد المدير", type: "password" },
          ].map(f => (
            <div key={f.key} style={{ marginBottom: 14 }}>
              <label style={{ display: "block", marginBottom: 5, fontSize: 13, fontWeight: "700", color: "#374151" }}>{f.label}</label>
              <input value={form[f.key] || ""} onChange={e => set(f.key, e.target.value)} type={f.type}
                style={{ width: "100%", padding: "9px 12px", border: "2px solid #e2e8f0", borderRadius: 8, fontSize: 14, fontFamily: "Cairo, Arial" }}
                onFocus={e => e.target.style.borderColor = "#2563a8"}
                onBlur={e => e.target.style.borderColor = "#e2e8f0"}
              />
            </div>
          ))}

          {/* Logo Upload */}
          <div style={{ marginBottom: 14 }}>
            <label style={{ display: "block", marginBottom: 5, fontSize: 13, fontWeight: "700", color: "#374151" }}>شعار الشركة (Logo)</label>
            <div style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 14px", border: "2px dashed #e2e8f0", borderRadius: 10, background: "#fafafa" }}>
              {form.companyLogo
                ? <img src={form.companyLogo} style={{ height: 48, maxWidth: 120, objectFit: "contain", borderRadius: 6 }} alt="logo" />
                : <div style={{ fontSize: 32 }}>🏢</div>}
              <div style={{ flex: 1 }}>
                <label style={{ display: "inline-block", padding: "7px 14px", background: "#1e3a5f", color: "white", borderRadius: 8, cursor: "pointer", fontSize: 13, fontWeight: "700", fontFamily: "Cairo, Arial" }}>
                  📁 رفع شعار
                  <input type="file" accept="image/*" style={{ display: "none" }} onChange={e => {
                    const file = e.target.files[0]; if (!file) return;
                    const reader = new FileReader();
                    reader.onload = ev => set("companyLogo", ev.target.result);
                    reader.readAsDataURL(file);
                    e.target.value = "";
                  }} />
                </label>
                {form.companyLogo && (
                  <button onClick={() => set("companyLogo", null)} style={{ marginRight: 8, padding: "7px 12px", background: "#fef2f2", color: "#dc2626", border: "none", borderRadius: 8, cursor: "pointer", fontSize: 13, fontWeight: "700", fontFamily: "Cairo, Arial" }}>
                    🗑️ حذف
                  </button>
                )}
                <div style={{ fontSize: 11, color: "#94a3b8", marginTop: 5 }}>PNG أو JPG — يظهر في PDF والتقارير</div>
              </div>
            </div>
          </div>
          <div style={{ background: "#fffbeb", border: "1px solid #fde68a", borderRadius: 8, padding: "10px 14px", marginBottom: 14, fontSize: 12, color: "#92400e" }}>
            💡 وقت الدوام الافتراضي يُستخدم فقط للموظفين غير المخصص لهم شيفت
          </div>
          {[
            { key: "workStart", label: "بداية الدوام الافتراضي", type: "time" },
            { key: "workEnd", label: "نهاية الدوام الافتراضي", type: "time" },
            { key: "lateTolerance", label: "دقائق السماح الافتراضية", type: "number" },
          ].map(f => (
            <div key={f.key} style={{ marginBottom: 14 }}>
              <label style={{ display: "block", marginBottom: 5, fontSize: 13, fontWeight: "700", color: "#374151" }}>{f.label}</label>
              <input value={form[f.key] || ""} onChange={e => set(f.key, e.target.value)} type={f.type}
                style={{ width: "100%", padding: "9px 12px", border: "2px solid #e2e8f0", borderRadius: 8, fontSize: 14, fontFamily: "Cairo, Arial" }} />
            </div>
          ))}
          <button onClick={saveSettings} style={{ width: "100%", padding: "11px", background: "#1e3a5f", color: "white", border: "none", borderRadius: 8, fontWeight: "700", cursor: "pointer", fontSize: 15, fontFamily: "Cairo, Arial" }}>
            💾 حفظ الإعدادات
          </button>
        </div>

        {/* Backup */}
        <div style={{ background: "white", borderRadius: 14, padding: 24, boxShadow: "0 2px 10px rgba(0,0,0,0.06)" }}>
          <h3 style={{ margin: "0 0 18px", color: "#1e3a5f", fontSize: 16, fontWeight: "800" }}>💾 النسخ الاحتياطي</h3>
          {settings.lastBackup && (
            <div style={{ background: "#f0fdf4", border: "1px solid #bbf7d0", borderRadius: 8, padding: "10px 14px", marginBottom: 16, fontSize: 13, color: "#16a34a" }}>
              ✅ آخر نسخة: {new Date(settings.lastBackup).toLocaleString("ar-EG")}
            </div>
          )}
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            <button onClick={exportBackup} style={{ padding: "12px", background: "#1e3a5f", color: "white", border: "none", borderRadius: 8, fontWeight: "700", cursor: "pointer", fontSize: 14, fontFamily: "Cairo, Arial", textAlign: "right" }}>
              💾 حفظ نسخة احتياطية (JSON)
            </button>
            <button onClick={exportAllExcel} style={{ padding: "12px", background: "#16a34a", color: "white", border: "none", borderRadius: 8, fontWeight: "700", cursor: "pointer", fontSize: 14, fontFamily: "Cairo, Arial", textAlign: "right" }}>
              📤 تصدير كل البيانات (Excel)
            </button>
            <label style={{ padding: "12px", background: "#2563a8", color: "white", border: "none", borderRadius: 8, fontWeight: "700", cursor: "pointer", fontSize: 14, fontFamily: "Cairo, Arial", textAlign: "right", display: "block" }}>
              📥 استعادة من نسخة احتياطية
              <input type="file" accept=".json" onChange={importBackup} style={{ display: "none" }} />
            </label>
          </div>

                border: "none", borderRadius: 8, fontWeight: "700", cursor: "pointer",
                fontSize: 14, fontFamily: "Cairo, Arial", letterSpacing: 0.3,

                🗑️ مسح كل بيانات البرنامج

            {/* Modal Header */}
            <div style={{ background: "linear-gradient(135deg,#dc2626,#b91c1c)", padding: "20px 24px", display: "flex", alignItems: "center", gap: 12 }}>
              <div style={{ width: 48, height: 48, background: "rgba(255,255,255,0.2)", borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 24, flexShrink: 0 }}>⚠️</div>
              <div>
                <div style={{ color: "white", fontWeight: "900", fontSize: 18 }}>تحذير — حذف نهائي</div>
                <div style={{ color: "rgba(255,255,255,0.8)", fontSize: 12, marginTop: 3 }}>هذا الإجراء لا يمكن التراجع عنه</div>

            {/* Modal Body */}
            <div style={{ padding: "24px" }}>

                <ul style={{ margin: "8px 0 0 0", paddingRight: 20 }}>
                  <li>👥 كل الموظفين ({employees.length} موظف)</li>
                  <li>📋 كل سجلات الحضور ({records.length} سجل)</li>

                <input

                  autoFocus
                />

              <div style={{ display: "flex", gap: 10 }}>

        </div>
