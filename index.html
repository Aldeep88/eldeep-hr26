}

// ══════════════════════════════════════════════
//  TAB: MESSAGES (ADMIN)
// ══════════════════════════════════════════════
function TabMessages({ employees, messages, setMessages, toast }) {
  const [selEmp, setSelEmp] = useState("");
  const [msgText, setMsgText] = useState("");
  const [sending, setSending] = useState(false);
  const [filterEmp, setFilterEmp] = useState("all");

  function sendMessage() {
    if (!selEmp) { toast("اختر موظفاً أولاً", "error"); return; }
    if (!msgText.trim()) { toast("اكتب نص الرسالة", "error"); return; }
    setSending(true);
    const msg = {
      id: generateId(),
      employeeId: selEmp,
      text: msgText.trim(),
      sentAt: new Date().toISOString(),
      read: false,
      readAt: null,
    };
    setMessages(p => [...p, msg]);
    toast("✅ تم إرسال الرسالة بنجاح");
    setMsgText("");
    setSelEmp("");
    setSending(false);
  }

  function deleteMessage(id) {
    if (!window.confirm("هل تريد حذف هذه الرسالة؟")) return;
    setMessages(p => p.filter(m => m.id !== id));
    toast("🗑️ تم حذف الرسالة");
  }

  const getEmpName = (id) => employees.find(e => e.id === id)?.name || "—";

  const filteredMsgs = [...messages]
    .filter(m => filterEmp === "all" || m.employeeId === filterEmp)
    .sort((a, b) => b.sentAt.localeCompare(a.sentAt));

  const unreadCount = messages.filter(m => !m.read).length;
  const readCount = messages.filter(m => m.read).length;

  return (
    <div>
      {/* Stats */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 12, marginBottom: 20 }}>
        {[
          { label: "إجمالي الرسائل", val: messages.length, color: "#1e3a5f", icon: "✉️" },
          { label: "لم تُقرأ بعد", val: unreadCount, color: "#dc2626", icon: "🔴" },
          { label: "تمت القراءة", val: readCount, color: "#16a34a", icon: "✅" },
        ].map((s, i) => (
          <div key={i} style={{ background: "white", borderRadius: 12, padding: "16px", boxShadow: "0 2px 8px rgba(0,0,0,0.06)", borderRight: `4px solid ${s.color}` }}>
            <div style={{ fontSize: 22, marginBottom: 4 }}>{s.icon}</div>
            <div style={{ fontSize: 26, fontWeight: "800", color: s.color }}>{s.val}</div>
            <div style={{ fontSize: 12, color: "#64748b", fontWeight: "600" }}>{s.label}</div>
          </div>
        ))}
      </div>

      {/* Send new message */}
      <div style={{ background: "white", borderRadius: 14, padding: 24, marginBottom: 20, boxShadow: "0 2px 10px rgba(0,0,0,0.06)" }}>
        <h3 style={{ margin: "0 0 18px", color: "#1e3a5f", fontSize: 16, fontWeight: "800" }}>📨 إرسال رسالة جديدة</h3>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 2fr", gap: 14, alignItems: "flex-start" }}>
          <div>
            <label style={{ display: "block", marginBottom: 6, fontSize: 13, fontWeight: "700", color: "#374151" }}>اختر الموظف</label>
            <select value={selEmp} onChange={e => setSelEmp(e.target.value)}
              style={{ width: "100%", padding: "10px 12px", border: "2px solid #e2e8f0", borderRadius: 8, fontSize: 14, fontFamily: "Cairo, Arial", background: "white" }}
              onFocus={e => e.target.style.borderColor = "#2563a8"}
              onBlur={e => e.target.style.borderColor = "#e2e8f0"}>
              <option value="">-- اختر موظف --</option>
              {employees.map(e => (
                <option key={e.id} value={e.id}>{e.name} — {e.department || "بدون قسم"}</option>
              ))}
            </select>
          </div>
          <div>
            <label style={{ display: "block", marginBottom: 6, fontSize: 13, fontWeight: "700", color: "#374151" }}>نص الرسالة</label>
            <textarea value={msgText} onChange={e => setMsgText(e.target.value)}
              placeholder="اكتب رسالتك هنا..."
              rows={3}
              style={{ width: "100%", padding: "10px 12px", border: "2px solid #e2e8f0", borderRadius: 8, fontSize: 14, fontFamily: "Cairo, Arial", resize: "vertical", direction: "rtl" }}
              onFocus={e => e.target.style.borderColor = "#2563a8"}
              onBlur={e => e.target.style.borderColor = "#e2e8f0"}
            />
          </div>
        </div>
        <div style={{ marginTop: 14, display: "flex", justifyContent: "flex-end" }}>
          <button onClick={sendMessage} disabled={sending || !selEmp || !msgText.trim()}
            style={{ padding: "11px 28px", background: (!selEmp || !msgText.trim()) ? "#e2e8f0" : "linear-gradient(135deg,#1e3a5f,#2563a8)", color: (!selEmp || !msgText.trim()) ? "#94a3b8" : "white", border: "none", borderRadius: 10, fontWeight: "800", cursor: (!selEmp || !msgText.trim()) ? "not-allowed" : "pointer", fontSize: 15, fontFamily: "Cairo, Arial", boxShadow: (!selEmp || !msgText.trim()) ? "none" : "0 4px 14px rgba(30,58,95,0.3)" }}>
            📨 إرسال الرسالة
          </button>
        </div>
      </div>

      {/* Messages list */}
      <div style={{ background: "white", borderRadius: 14, overflow: "hidden", boxShadow: "0 2px 10px rgba(0,0,0,0.06)" }}>
        <div style={{ padding: "16px 20px", borderBottom: "1px solid #f1f5f9", display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 10 }}>
          <h3 style={{ margin: 0, color: "#1e3a5f", fontSize: 15, fontWeight: "800" }}>📋 الرسائل المُرسلة</h3>
          <select value={filterEmp} onChange={e => setFilterEmp(e.target.value)}
            style={{ padding: "7px 10px", border: "2px solid #e2e8f0", borderRadius: 8, fontSize: 13, fontFamily: "Cairo, Arial" }}>
            <option value="all">كل الموظفين</option>
            {employees.map(e => <option key={e.id} value={e.id}>{e.name}</option>)}
          </select>
        </div>
        {filteredMsgs.length === 0 ? (
          <div style={{ padding: 40, textAlign: "center", color: "#94a3b8", fontSize: 14 }}>لا توجد رسائل مُرسلة</div>
        ) : (
          <div style={{ padding: "12px 16px", display: "flex", flexDirection: "column", gap: 10 }}>
            {filteredMsgs.map(msg => (
              <div key={msg.id} style={{
                padding: "14px 18px", borderRadius: 12,
                background: msg.read ? "#f0fdf4" : "#fff7ed",
                border: msg.read ? "1.5px solid #bbf7d0" : "1.5px solid #fed7aa",
                display: "flex", gap: 14, alignItems: "flex-start",
              }}>
                <div style={{ fontSize: 24, flexShrink: 0, marginTop: 2 }}>{msg.read ? "✅" : "⏳"}</div>
                <div style={{ flex: 1 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6, flexWrap: "wrap", gap: 6 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <span style={{ fontWeight: "800", fontSize: 14, color: "#1e293b" }}>👤 {getEmpName(msg.employeeId)}</span>
                      <span style={{
                        fontSize: 11, fontWeight: "700", padding: "2px 10px", borderRadius: 20,
                        background: msg.read ? "#dcfce7" : "#fee2e2",
                        color: msg.read ? "#16a34a" : "#dc2626",
                      }}>
                        {msg.read ? `✅ قرأها في ${new Date(msg.readAt).toLocaleString("ar-EG")}` : "🔴 لم يقرأها بعد"}
                      </span>
                    </div>
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <span style={{ fontSize: 12, color: "#94a3b8" }}>
                        {new Date(msg.sentAt).toLocaleString("ar-EG")}
                      </span>
                      <button onClick={() => deleteMessage(msg.id)}
                        style={{ padding: "4px 8px", background: "#fef2f2", color: "#dc2626", border: "none", borderRadius: 6, cursor: "pointer", fontSize: 12, fontWeight: "700", fontFamily: "Cairo, Arial" }}>
                        🗑️
                      </button>
                    </div>
                  </div>
                  <p style={{ margin: 0, fontSize: 14, color: "#374151", lineHeight: 1.7, fontWeight: "600" }}>{msg.text}</p>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════
//  ADMIN DASHBOARD
// ══════════════════════════════════════════════
// ══════════════════════════════════════════════
//  TAB: DEVICES MANAGEMENT (Admin)
// ══════════════════════════════════════════════
function TabDevices({ devices, branches, approveDevice, rejectDevice, deleteDevice, toast }) {
  const [filterStatus, setFilterStatus] = useState("all");
  const [filterBranch, setFilterBranch]  = useState("all");

  const filtered = devices.filter(d => {
    if (filterStatus !== "all" && d.status !== filterStatus) return false;
    if (filterBranch !== "all" && d.branchId !== filterBranch) return false;
    return true;
  }).sort((a, b) => (b.requestedAt || "").localeCompare(a.requestedAt || ""));

  const pendingCount = devices.filter(d => d.status === "pending").length;

  const statusBadge = (s) => {
    if (s === "approved") return { bg: "#f0fdf4", color: "#16a34a", label: "✅ معتمد" };
    if (s === "pending")  return { bg: "#fffbeb", color: "#d97706", label: "⏳ في الانتظار" };
    if (s === "rejected") return { bg: "#fef2f2", color: "#dc2626", label: "🚫 مرفوض" };
    return { bg: "#f1f5f9", color: "#64748b", label: s };
  };

  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 20, flexWrap: "wrap", gap: 10 }}>
        <div>
          <h2 style={{ margin: 0, color: "#1e3a5f", fontSize: 20, fontWeight: "800" }}>📱 إدارة الأجهزة</h2>
          {pendingCount > 0 && (
            <div style={{ marginTop: 4, fontSize: 13, color: "#d97706", fontWeight: "700" }}>
              🔔 {pendingCount} طلب في الانتظار
            </div>
          )}
        </div>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          <select value={filterStatus} onChange={e => setFilterStatus(e.target.value)}
            style={{ padding: "8px 12px", border: "2px solid #e2e8f0", borderRadius: 8, fontSize: 13, fontFamily: "Cairo, Arial", background: filterStatus !== "all" ? "#eff6ff" : "white", borderColor: filterStatus !== "all" ? "#2563a8" : "#e2e8f0" }}>
            <option value="all">كل الحالات</option>
            <option value="pending">⏳ في الانتظار</option>
            <option value="approved">✅ معتمد</option>
            <option value="rejected">🚫 مرفوض</option>
          </select>
          {branches.length > 0 && (
            <select value={filterBranch} onChange={e => setFilterBranch(e.target.value)}
              style={{ padding: "8px 12px", border: "2px solid #e2e8f0", borderRadius: 8, fontSize: 13, fontFamily: "Cairo, Arial" }}>
              <option value="all">🏪 كل الفروع</option>
              {branches.map(b => <option key={b.id} value={b.id}>🏪 {b.name}</option>)}
            </select>
          )}
        </div>
      </div>

      {pendingCount > 0 && filterStatus === "all" && (
        <div style={{ background: "linear-gradient(135deg,#fffbeb,#fef3c7)", border: "2px solid #fde68a", borderRadius: 12, padding: "14px 18px", marginBottom: 18, display: "flex", alignItems: "center", gap: 12 }}>
          <span style={{ fontSize: 28 }}>🔔</span>
          <div>
            <div style={{ fontWeight: "800", color: "#92400e", fontSize: 14 }}>يوجد {pendingCount} طلب جهاز في الانتظار</div>
            <div style={{ fontSize: 12, color: "#b45309", marginTop: 2 }}>راجع الطلبات أدناه ووافق أو ارفض كل جهاز</div>
          </div>
        </div>
      )}

      {filtered.length === 0 ? (
        <div style={{ background: "white", borderRadius: 14, padding: 48, textAlign: "center", boxShadow: "0 2px 10px rgba(0,0,0,0.06)" }}>
          <div style={{ fontSize: 48, marginBottom: 12 }}>📱</div>
          <p style={{ color: "#94a3b8", fontSize: 15, fontWeight: "700" }}>لا توجد أجهزة بعد</p>
          <p style={{ color: "#cbd5e1", fontSize: 13 }}>ستظهر الأجهزة هنا عند طلب موظف الاعتماد</p>
        </div>
      ) : (
        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          {filtered.map(d => {
            const branch = branches.find(b => b.id === d.branchId);
            const sb = statusBadge(d.status);
            const reqDate = d.requestedAt ? new Date(d.requestedAt).toLocaleString("ar-EG") : "—";
            return (
              <div key={d.deviceId} style={{
                background: "white", borderRadius: 14, padding: "18px 20px",
                boxShadow: "0 2px 10px rgba(0,0,0,0.06)",
                border: d.status === "pending" ? "2px solid #fde68a" : "2px solid #f1f5f9",
              }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 10 }}>
                  <div style={{ flex: 1 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 6, flexWrap: "wrap" }}>
                      <span style={{ fontWeight: "800", fontSize: 16, color: "#1e293b" }}>📱 {d.name || "جهاز بدون اسم"}</span>
                      <span style={{ background: sb.bg, color: sb.color, padding: "2px 10px", borderRadius: 20, fontSize: 12, fontWeight: "700" }}>{sb.label}</span>
                      {branch && <span style={{ background: "#f0fdf4", color: "#16a34a", padding: "2px 10px", borderRadius: 20, fontSize: 12, fontWeight: "700" }}>🏪 {branch.name}</span>}
                    </div>
                    <div style={{ fontSize: 11, color: "#94a3b8" }}>
                      🕐 طلب في: {reqDate} &nbsp;|&nbsp;
                      🔑 ID: <code style={{ fontSize: 10, background: "#f1f5f9", padding: "1px 5px", borderRadius: 3 }}>{d.deviceId?.slice(0, 18)}...</code>
                    </div>
                    {d.userAgent && <div style={{ fontSize: 10, color: "#cbd5e1", marginTop: 3, fontFamily: "monospace" }}>{d.userAgent.slice(0, 80)}</div>}
                  </div>
                  <div style={{ display: "flex", gap: 8, flexShrink: 0, flexWrap: "wrap" }}>
                    {d.status !== "approved" && (
                      <button onClick={() => { approveDevice(d.deviceId, d.branchId); toast(`✅ تم اعتماد "${d.name}"`); }}
                        style={{ padding: "8px 16px", background: "#16a34a", color: "white", border: "none", borderRadius: 8, fontWeight: "800", cursor: "pointer", fontSize: 13, fontFamily: "Cairo, Arial" }}>
                        ✅ موافقة
                      </button>
                    )}
                    {d.status !== "rejected" && (
                      <button onClick={() => { rejectDevice(d.deviceId); toast(`🚫 تم رفض "${d.name}"`, "error"); }}
                        style={{ padding: "8px 16px", background: "#fef2f2", color: "#dc2626", border: "1px solid #fca5a5", borderRadius: 8, fontWeight: "800", cursor: "pointer", fontSize: 13, fontFamily: "Cairo, Arial" }}>
                        🚫 رفض
                      </button>
                    )}
                    <button onClick={() => { if (!window.confirm(`حذف "${d.name}"؟`)) return; deleteDevice(d.deviceId); toast("🗑️ تم حذف الجهاز", "error"); }}
                      style={{ padding: "8px 12px", background: "#f1f5f9", color: "#64748b", border: "none", borderRadius: 8, fontWeight: "700", cursor: "pointer", fontSize: 13, fontFamily: "Cairo, Arial" }}>
                      🗑️
                    </button>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function AdminDashboard({ user, onLogout, db }) {
  const [tab, setTab] = useState("employees");
  const { employees, setEmployees, records, setRecords, settings, setSettings, shifts, setShifts, messages, setMessages, branches, setBranches, devices, approveDevice, rejectDevice, deleteDevice } = db;
  const { toasts, show: toast } = useToast();

  const unreadMsgsCount = messages ? messages.filter(m => !m.read).length : 0;
  const pendingDevicesCount = devices ? devices.filter(d => d.status === "pending").length : 0;

  const tabs = [
    { id: "employees", label: "👥 الموظفين" },
    { id: "branches",  label: "🏪 الفروع" },
    { id: "devices",   label: pendingDevicesCount > 0 ? `📱 الأجهزة 🔴${pendingDevicesCount}` : "📱 الأجهزة" },
    { id: "attendance", label: "📊 الحضور" },
    { id: "manual",    label: "📝 إدخال يدوي" },
    { id: "report",    label: "📈 التقرير الشهري" },
    { id: "statistics", label: "🏆 الإحصائيات" },
    { id: "messages",  label: unreadMsgsCount > 0 ? `✉️ الرسائل 🔴${unreadMsgsCount}` : "✉️ الرسائل" },
    { id: "settings",  label: "⚙️ الإعدادات" },
  ];

  return (
    <div style={{ minHeight: "100vh", background: "#f1f5f9", fontFamily: "Cairo, Arial", direction: "rtl", display: "flex" }}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap'); *{box-sizing:border-box}`}</style>
      <Toast toasts={toasts} />

      {/* Sidebar */}
      <div style={{ width: 220, background: "#1e3a5f", minHeight: "100vh", padding: "20px 12px", display: "flex", flexDirection: "column", flexShrink: 0 }}>
        <div style={{ textAlign: "center", marginBottom: 28, padding: "0 8px" }}>
          <div style={{ fontSize: 36, marginBottom: 6 }}>
            {settings.companyLogo
              ? <img src={settings.companyLogo} style={{ height: 48, maxWidth: 160, objectFit: "contain", borderRadius: 8 }} alt="logo" />
              : "🏢"}
          </div>
          <div style={{ color: "white", fontWeight: "800", fontSize: 14, lineHeight: 1.4 }}>{settings.companyName}</div>
          <div style={{ color: "#94b8e0", fontSize: 12, marginTop: 4 }}>لوحة المدير</div>
        </div>

        {/* Quick Save Button */}
        <div style={{ marginBottom: 16, padding: "0 2px" }}>
          <button onClick={() => {
            const data = {
              version: "1.0",
              exportedAt: new Date().toISOString(),
              employees: JSON.parse(localStorage.getItem(KEYS.employees) || "[]"),
              records: JSON.parse(localStorage.getItem(KEYS.records) || "[]"),
              settings: JSON.parse(localStorage.getItem(KEYS.settings) || "{}"),
              shifts: JSON.parse(localStorage.getItem(KEYS.shifts) || "[]"),
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            const now = new Date();
            a.download = `backup_${now.toISOString().slice(0,10)}_${String(now.getHours()).padStart(2,"0")}-${String(now.getMinutes()).padStart(2,"0")}.json`;
            a.click();
            toast("تم تحميل ملف البيانات — احتفظ بيه!");
          }} style={{
            width: "100%", padding: "10px 14px", background: "#16a34a", color: "white",
            border: "none", borderRadius: 10, fontWeight: "700", fontSize: 13,
            fontFamily: "Cairo, Arial", cursor: "pointer", textAlign: "center",
            boxShadow: "0 2px 8px rgba(22,163,74,0.4)",
          }}>
            💾 حفظ البيانات الآن
          </button>
        </div>

        <nav style={{ flex: 1 }}>
          {tabs.map(t => (
            <button key={t.id} onClick={() => setTab(t.id)} style={{
              width: "100%", padding: "11px 14px", marginBottom: 4, border: "none", borderRadius: 10,
              textAlign: "right", cursor: "pointer", fontWeight: "700", fontSize: 14, fontFamily: "Cairo, Arial",
              transition: "all 0.2s",
              background: tab === t.id ? "rgba(255,255,255,0.15)" : "transparent",
              color: tab === t.id ? "white" : "rgba(255,255,255,0.6)",
              borderRight: tab === t.id ? "3px solid #60a5fa" : "3px solid transparent",
            }}>{t.label}</button>
          ))}
        </nav>

        <button onClick={onLogout} style={{
          width: "100%", padding: "10px", background: "rgba(239,68,68,0.15)", color: "#fca5a5",
          border: "1px solid rgba(239,68,68,0.3)", borderRadius: 8, fontWeight: "700", cursor: "pointer",
          fontSize: 13, fontFamily: "Cairo, Arial", marginTop: "auto"
        }}>🚪 تسجيل الخروج</button>
      </div>

      {/* Main */}
      <div style={{ flex: 1, padding: 24, overflowY: "auto" }}>
        <div style={{ marginBottom: 20, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <div>
            <p style={{ margin: 0, color: "#64748b", fontSize: 13 }}>{new Date().toLocaleDateString("ar-EG", { weekday: "long", year: "numeric", month: "long", day: "numeric" })}</p>
          </div>
          <div style={{ background: "white", borderRadius: 10, padding: "8px 14px", fontSize: 13, color: "#475569", fontWeight: "600", boxShadow: "0 2px 6px rgba(0,0,0,0.06)" }}>
            👑 مرحباً، المدير
          </div>
        </div>

        {tab === "employees"  && <TabEmployees employees={employees} setEmployees={setEmployees} records={records} toast={toast} shifts={shifts} branches={branches || []} />}
        {tab === "branches"   && <TabBranches branches={branches || []} setBranches={setBranches} employees={employees} setEmployees={setEmployees} toast={toast} />}
        {tab === "devices"    && <TabDevices devices={devices || []} branches={branches || []} approveDevice={approveDevice} rejectDevice={rejectDevice} deleteDevice={deleteDevice} toast={toast} />}
        {tab === "attendance" && <TabAttendance employees={employees} records={records} toast={toast} settings={settings} branches={branches || []} />}
        {tab === "manual"     && <TabManualAttendance employees={employees} records={records} setRecords={setRecords} settings={settings} shifts={shifts} toast={toast} branches={branches || []} />}
        {tab === "report"     && <TabMonthlyReport employees={employees} records={records} settings={settings} toast={toast} shifts={shifts} branches={branches || []} />}
        {tab === "statistics" && <TabStatistics employees={employees} records={records} settings={settings} branches={branches || []} />}
        {tab === "messages"   && <TabMessages employees={employees} messages={messages || []} setMessages={setMessages} toast={toast} />}
        {tab === "settings"   && <TabSettings settings={settings} setSettings={setSettings} employees={employees} setEmployees={setEmployees} records={records} setRecords={setRecords} toast={toast} shifts={shifts} setShifts={setShifts} />}
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════
//  EMPLOYEE DASHBOARD
// ══════════════════════════════════════════════
function EmployeeDashboard({ user, onLogout, db }) {
  const { records, setRecords, settings, shifts, messages, setMessages, branches } = db;
  const { toasts, show: toast } = useToast();
  const [time, setTime] = useState(new Date());
  const [empTab, setEmpTab] = useState("home");
  const [msgAlert, setMsgAlert] = useState(true);
  const today = getToday();
  const todayRec = records.find(r => r.employeeId === user.id && r.date === today);

  // الفرع المخصص للموظف
  const empBranch = branches ? branches.find(b => b.id === user.branchId) : null;

  // الجهاز الحالي معتمد على فرع إيه؟ نجيبه من Firebase عبر deviceId
  const deviceId = getOrCreateDeviceId();
  const [deviceApprovedBranchId, setDeviceApprovedBranchId] = useState(null);
  useEffect(() => {
    const fsdb = window.__fsdb;
    if (!fsdb) return;
    const unsub = fsdb.collection("devices").doc(deviceId).onSnapshot(snap => {
      if (snap.exists && snap.data().status === "approved") {
        setDeviceApprovedBranchId(snap.data().branchId || null);
      }
    });
    return () => unsub();
  }, [deviceId]);

  // الموظف من فرع مختلف عن جهاز الفرع الحالي؟
  const wrongBranch = deviceApprovedBranchId && user.branchId && deviceApprovedBranchId !== user.branchId && branches && branches.length > 0;
  const deviceBranchName = wrongBranch ? (branches || []).find(b => b.id === deviceApprovedBranchId)?.name : null;

  // My unread messages
  const myMessages = (messages || []).filter(m => m.employeeId === user.id)
    .sort((a, b) => b.sentAt.localeCompare(a.sentAt));
  const myUnread = myMessages.filter(m => !m.read);

  // Mark a message as read
  function markRead(msgId) {
    setMessages(p => p.map(m => m.id === msgId ? { ...m, read: true, readAt: new Date().toISOString() } : m));
  }

  // Mark all as read when opening messages tab
  function openMessagesTab() {
    setEmpTab("messages");
    setMsgAlert(false);
    myUnread.forEach(m => markRead(m.id));
  }

  useEffect(() => {
    const t = setInterval(() => setTime(new Date()), 1000);
    return () => clearInterval(t);
  }, []);

  // Get employee's assigned shift (fallback to settings defaults)
  const empShift = shifts?.find(s => s.id === user.shiftId);
  const shiftStart = empShift?.start || settings.workStart;
  const shiftEnd = empShift?.end || settings.workEnd;
  const shiftTolerance = empShift ? Number(empShift.tolerance) : Number(settings.lateTolerance);

  function checkIn() {
    if (todayRec) { toast("سبق تسجيل الحضور اليوم!", "error"); return; }
    if (wrongBranch) { toast(`❌ هذا الجهاز مخصص لفرع "${deviceBranchName}" — لا يمكنك تسجيل الحضور هنا`, "error"); return; }
    const now = getTimeNow();
    const late = calcLateMinutes(now, shiftStart, shiftTolerance);
    const rec = { id: generateId(), employeeId: user.id, date: today, checkIn: now, checkOut: null, status: late > 0 ? "متأخر" : "حاضر", lateMinutes: late, shiftId: user.shiftId || null };
    setRecords(p => [...p, rec]);
    toast(late > 0 ? `⚠️ تم تسجيل الحضور — متأخر ${late} دقيقة` : "✅ تم تسجيل الحضور بنجاح");
  }

  function checkOut() {
    if (!todayRec) { toast("سجّل حضورك أولاً!", "error"); return; }
    if (todayRec.checkOut) { toast("سبق تسجيل الانصراف اليوم!", "error"); return; }
    setRecords(p => p.map(r => r.id === todayRec.id ? { ...r, checkOut: getTimeNow() } : r));
    toast("✅ تم تسجيل الانصراف بنجاح");
  }

  const myRecords = records.filter(r => r.employeeId === user.id).sort((a, b) => b.date.localeCompare(a.date));
  const last30 = myRecords.slice(0, 30);
  const thisMonth = myRecords.filter(r => r.date.startsWith(today.slice(0, 7)));
  const presentCount = thisMonth.filter(r => r.status !== "غائب").length;
  const lateCount = thisMonth.filter(r => r.status === "متأخر").length;
  const totalMinutes = thisMonth.reduce((a, r) => {
    if (!r.checkIn || !r.checkOut) return a;
    const [ih, im] = r.checkIn.split(":").map(Number);
    const [oh, om] = r.checkOut.split(":").map(Number);
    let diff = (oh * 60 + om) - (ih * 60 + im);
    if (diff <= 0) diff += 24 * 60; // شيفت يعدي منتصف الليل
    if (diff > 24 * 60) return a;   // بيانات غلط — نتجاهلها
    return a + diff;
  }, 0);
  const totalHours = Math.floor(totalMinutes / 60);
  const totalMins = totalMinutes % 60;

  const statusStyle = (s) => ({
    padding: "2px 8px", borderRadius: 20, fontSize: 11, fontWeight: "700",
    background: s === "حاضر" ? "#f0fdf4" : s === "متأخر" ? "#fffbeb" : "#fef2f2",
    color: s === "حاضر" ? "#16a34a" : s === "متأخر" ? "#d97706" : "#dc2626",
  });

  return (
    <div style={{ minHeight: "100vh", background: "#f1f5f9", fontFamily: "Cairo, Arial", direction: "rtl" }}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap'); *{box-sizing:border-box} @keyframes slideDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}} @keyframes pulse2{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}`}</style>
      <Toast toasts={toasts} />

      {/* Header */}
      <div style={{ background: "linear-gradient(135deg, #1e3a5f, #2563a8)", padding: "20px 24px" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <div>
            <div style={{ color: "rgba(255,255,255,0.7)", fontSize: 13 }}>مرحباً،</div>
            <div style={{ color: "white", fontWeight: "800", fontSize: 20 }}>{user.name}</div>
            <div style={{ display: "flex", alignItems: "center", gap: 6, marginTop: 2, flexWrap: "wrap" }}>
              <div style={{ color: "#94b8e0", fontSize: 12 }}>{user.department}</div>
              {empShift && (
                <span style={{ background: `${empShift.color}`, color: "white", padding: "1px 8px", borderRadius: 10, fontSize: 11, fontWeight: "700" }}>
                  {empShift.name}
                </span>
              )}
              {empBranch && (
                <span style={{ background: "rgba(255,255,255,0.18)", color: "white", padding: "1px 8px", borderRadius: 10, fontSize: 11, fontWeight: "700" }}>
                  🏪 {empBranch.name}
                </span>
              )}
            </div>
            {empShift && (
              <div style={{ color: "rgba(255,255,255,0.55)", fontSize: 11, marginTop: 2 }}>
                🕐 {empShift.start} – {empShift.end} &nbsp;|&nbsp; سماح {empShift.tolerance}د
              </div>
            )}
          </div>
          <div style={{ textAlign: "center" }}>
            <div style={{ color: "white", fontWeight: "800", fontSize: 26, fontVariantNumeric: "tabular-nums" }}>
              {time.toLocaleTimeString("ar-EG", { hour: "2-digit", minute: "2-digit", second: "2-digit" })}
            </div>
            <div style={{ color: "rgba(255,255,255,0.7)", fontSize: 12 }}>
              {time.toLocaleDateString("ar-EG", { weekday: "long", month: "long", day: "numeric" })}
            </div>
          </div>
          <button onClick={onLogout} style={{ padding: "8px 16px", background: "rgba(255,255,255,0.15)", color: "white", border: "1px solid rgba(255,255,255,0.3)", borderRadius: 8, fontWeight: "700", cursor: "pointer", fontSize: 13, fontFamily: "Cairo, Arial" }}>
            🚪 خروج
          </button>
        </div>
        {/* Employee Tabs */}
        <div style={{ display: "flex", gap: 6 }}>
          {[
            { id: "home", label: "🏠 الرئيسية" },
            { id: "history", label: "📋 السجل" },
            { id: "summary", label: "📊 ملخصي" },
            { id: "messages", label: myUnread.length > 0 ? `✉️ رسائلي 🔴${myUnread.length}` : "✉️ رسائلي" },
          ].map(t => (
            <button key={t.id}
              onClick={() => t.id === "messages" ? openMessagesTab() : setEmpTab(t.id)}
              style={{
                padding: "7px 14px", border: "none", borderRadius: 8, cursor: "pointer",
                fontWeight: "700", fontSize: 13, fontFamily: "Cairo, Arial",
                background: empTab === t.id ? "rgba(255,255,255,0.25)" : "rgba(255,255,255,0.08)",
                color: empTab === t.id ? "white" : "rgba(255,255,255,0.6)",
                borderBottom: empTab === t.id ? "2px solid white" : "2px solid transparent",
                position: "relative",
              }}>{t.label}</button>
          ))}
        </div>
      </div>

      <div style={{ padding: 20, maxWidth: 720, margin: "0 auto" }}>

        {/* ⚠️ WRONG BRANCH WARNING */}
        {wrongBranch && (
          <div style={{
            marginBottom: 16, background: "linear-gradient(135deg,#7c1d1d,#dc2626)",
            borderRadius: 14, padding: "16px 20px", boxShadow: "0 6px 20px rgba(220,38,38,0.35)",
            display: "flex", alignItems: "center", gap: 14,
          }}>
            <div style={{ fontSize: 34, flexShrink: 0 }}>⚠️</div>
            <div>
              <div style={{ color: "white", fontWeight: "900", fontSize: 15, marginBottom: 4 }}>
                أنت على جهاز فرع خطأ!
              </div>
              <div style={{ color: "rgba(255,255,255,0.85)", fontSize: 12, fontWeight: "600" }}>
                هذا الجهاز مخصص لـ <strong>"{deviceBranchName}"</strong> — لكنك من فرع <strong>"{empBranch?.name || "آخر"}"</strong>.<br />
                لا يمكنك تسجيل الحضور من هنا. استخدم جهاز فرعك.
              </div>
            </div>
          </div>
        )}
        {myUnread.length > 0 && msgAlert && empTab !== "messages" && (
          <div style={{
            marginBottom: 16,
            background: "linear-gradient(135deg,#7f1d1d,#dc2626)",
            borderRadius: 16,
            padding: "0",
            boxShadow: "0 6px 24px rgba(220,38,38,0.45)",
            overflow: "hidden",
            animation: "pulse2 1.5s ease-in-out infinite",
          }}>
            <div style={{ padding: "16px 20px", display: "flex", alignItems: "center", gap: 14 }}>
              <div style={{ fontSize: 36, flexShrink: 0 }}>📢</div>
              <div style={{ flex: 1 }}>
                <div style={{ color: "white", fontWeight: "900", fontSize: 16, marginBottom: 4 }}>
                  ⚠️ لديك {myUnread.length} رسالة جديدة من الإدارة!
                </div>
                <div style={{ color: "rgba(255,255,255,0.85)", fontSize: 13, fontWeight: "600" }}>
                  يرجى الاطلاع على الرسائل فوراً — اضغط "عرض الرسائل" أدناه
                </div>
              </div>
              <button
                onClick={() => setMsgAlert(false)}
                style={{ background: "rgba(255,255,255,0.15)", border: "none", color: "white", borderRadius: 8, padding: "6px 10px", cursor: "pointer", fontSize: 16, fontWeight: "700", fontFamily: "Cairo, Arial", flexShrink: 0 }}>
                ✕
              </button>
            </div>
            <div style={{ background: "rgba(0,0,0,0.15)", padding: "10px 20px", display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
              {myUnread.slice(0, 2).map(m => (
                <div key={m.id} style={{ background: "rgba(255,255,255,0.15)", borderRadius: 8, padding: "5px 12px", color: "white", fontSize: 12, fontWeight: "600", maxWidth: 260, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                  📝 {m.text.slice(0, 50)}{m.text.length > 50 ? "..." : ""}
                </div>
              ))}
              {myUnread.length > 2 && (
                <div style={{ color: "rgba(255,255,255,0.7)", fontSize: 12 }}>+{myUnread.length - 2} رسائل أخرى</div>
              )}
              <button onClick={openMessagesTab}
                style={{ marginRight: "auto", padding: "7px 18px", background: "white", color: "#dc2626", border: "none", borderRadius: 8, fontWeight: "800", cursor: "pointer", fontSize: 13, fontFamily: "Cairo, Arial" }}>
                📨 عرض الرسائل
              </button>
            </div>
          </div>
        )}

        {/* HOME TAB */}
        {empTab === "home" && (
          <>
            {/* Check In/Out Card */}
            <div style={{ background: "white", borderRadius: 16, padding: 28, marginBottom: 16, boxShadow: "0 4px 20px rgba(0,0,0,0.08)", textAlign: "center" }}>
              <h3 style={{ margin: "0 0 18px", color: "#1e3a5f", fontSize: 18, fontWeight: "800" }}>تسجيل الحضور والانصراف</h3>

              {todayRec ? (
                <div style={{ background: "#f0fdf4", border: "1px solid #bbf7d0", borderRadius: 12, padding: "14px 20px", marginBottom: 18 }}>
                  <div style={{ fontSize: 13, color: "#16a34a", fontWeight: "700" }}>
                    ✅ حضور: <strong>{todayRec.checkIn}</strong>
                    {todayRec.checkOut ? <> &nbsp;|&nbsp; 🚪 انصراف: <strong>{todayRec.checkOut}</strong> &nbsp;|&nbsp; ⏱️ {calcWorkHours(todayRec.checkIn, todayRec.checkOut)}</> : " — في انتظار الانصراف"}
                  </div>
                  {todayRec.lateMinutes > 0 && <div style={{ fontSize: 12, color: "#d97706", marginTop: 4 }}>⚠️ تأخير: {todayRec.lateMinutes} دقيقة</div>}
                </div>
              ) : (
                <div style={{ background: "#fffbeb", border: "1px solid #fde68a", borderRadius: 12, padding: "12px 16px", marginBottom: 18, fontSize: 13, color: "#92400e" }}>
                  ⚠️ لم يتم تسجيل الحضور — وقت الدوام: <strong>{shiftStart}</strong>
                  {empShift && <span style={{ marginRight: 8, background: `${empShift.color}20`, color: empShift.color, padding: "2px 8px", borderRadius: 10, fontSize: 12, fontWeight: "700" }}>{empShift.name}</span>}
                </div>
              )}

              <div style={{ display: "flex", gap: 14, justifyContent: "center" }}>
                <button onClick={checkIn} disabled={!!todayRec || !!wrongBranch} style={{
                  padding: "15px 30px", border: "none", borderRadius: 14, fontWeight: "800", fontSize: 16,
                  cursor: (todayRec || wrongBranch) ? "not-allowed" : "pointer", fontFamily: "Cairo, Arial",
                  background: (todayRec || wrongBranch) ? "#e2e8f0" : "linear-gradient(135deg,#16a34a,#22c55e)",
                  color: (todayRec || wrongBranch) ? "#94a3b8" : "white",
                  boxShadow: (todayRec || wrongBranch) ? "none" : "0 6px 18px rgba(22,163,74,0.4)",
                  animation: (!todayRec && !wrongBranch) ? "pulse2 2s ease-in-out infinite" : "none",
                }}>✅ تسجيل حضور</button>
                <button onClick={checkOut} disabled={!todayRec || !!todayRec?.checkOut} style={{
                  padding: "15px 30px", border: "none", borderRadius: 14, fontWeight: "800", fontSize: 16, cursor: (!todayRec || todayRec?.checkOut) ? "not-allowed" : "pointer", fontFamily: "Cairo, Arial",
                  background: (!todayRec || todayRec?.checkOut) ? "#e2e8f0" : "linear-gradient(135deg,#dc2626,#ef4444)", color: (!todayRec || todayRec?.checkOut) ? "#94a3b8" : "white",
                  boxShadow: (!todayRec || todayRec?.checkOut) ? "none" : "0 6px 18px rgba(220,38,38,0.4)",
                }}>🚪 تسجيل انصراف</button>
              </div>
              {wrongBranch && (
                <div style={{ marginTop: 14, background: "#fef2f2", border: "1px solid #fca5a5", borderRadius: 10, padding: "10px 14px", fontSize: 13, color: "#dc2626", fontWeight: "700", textAlign: "center" }}>
                  🚫 تسجيل الحضور معطّل — هذا الجهاز مخصص لفرع "{deviceBranchName}"، وليس فرعك
                </div>
              )}
            </div>

            {/* This Month Quick Stats */}
            <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 10 }}>
              {[
                { label: "أيام الحضور", val: presentCount, color: "#16a34a", icon: "✅" },
                { label: "أيام التأخير", val: lateCount, color: "#d97706", icon: "⚠️" },
                { label: "سجلات الشهر", val: thisMonth.length, color: "#2563a8", icon: "📅" },
                { label: "ساعات الشهر", val: `${totalHours}س`, color: "#7c3aed", icon: "⏱️" },
              ].map((s, i) => (
                <div key={i} style={{ background: "white", borderRadius: 12, padding: "14px 10px", textAlign: "center", boxShadow: "0 2px 8px rgba(0,0,0,0.06)" }}>
                  <div style={{ fontSize: 20 }}>{s.icon}</div>
                  <div style={{ fontSize: 20, fontWeight: "800", color: s.color, marginTop: 4 }}>{s.val}</div>
                  <div style={{ fontSize: 10, color: "#64748b", fontWeight: "600", marginTop: 2 }}>{s.label}</div>
                </div>
              ))}
            </div>
          </>
        )}

        {/* HISTORY TAB */}
        {empTab === "history" && (
          <div style={{ background: "white", borderRadius: 14, overflow: "hidden", boxShadow: "0 2px 10px rgba(0,0,0,0.06)" }}>
            <div style={{ padding: "16px 18px", borderBottom: "1px solid #f1f5f9", display: "flex", justifyContent: "space-between", alignItems: "center" }}>

              <div style={{ display: "grid", gridTemplateColumns: "repeat(3,1fr)", gap: 12, marginBottom: 16 }}>

                  { label: "أيام الغياب", val: Math.max(0, 22 - presentCount), color: "#dc2626", icon: "❌" },

                  <div style={{
                    height: "100%", borderRadius: 99, transition: "width 0.8s",

              </div>
            </div>

            {/* Last 7 days mini chart */}
            <div style={{ background: "white", borderRadius: 14, padding: 20, boxShadow: "0 2px 10px rgba(0,0,0,0.06)" }}>

              <div style={{ display: "flex", gap: 8, alignItems: "flex-end", height: 100 }}>
                {(() => {
                  const days = [];
                  for (let i = 6; i >= 0; i--) {
                    const d = new Date(); d.setDate(d.getDate() - i);
                    const ds = d.toISOString().split("T")[0];
                    const rec = records.find(r => r.employeeId === user.id && r.date === ds);
                    days.push({ ds, rec, label: ["أحد","اثن","ثلا","أرب","خمس","جمع","سبت"][d.getDay()], isToday: ds === today });
                  }
                  return days.map((d, i) => (
                    <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center" }}>
                      <div style={{ width: "100%", height: 70, display: "flex", alignItems: "flex-end", justifyContent: "center" }}>
                        <div style={{
                          width: "80%", borderRadius: 6,
                          height: d.rec ? (d.rec.checkOut ? "100%" : "60%") : "15%",
                          background: d.rec ? (d.rec.status === "متأخر" ? "#fde68a" : "#3b82f6") : "#fee2e2",
                          border: d.isToday ? "2px solid #1e3a5f" : "none",

                        }} />

                      <div style={{ fontSize: 10, color: d.isToday ? "#1e3a5f" : "#94a3b8", marginTop: 4, fontWeight: d.isToday ? "800" : "600" }}>{d.label}</div>
                    </div>
                  ));
                })()}
              </div>
              <div style={{ display: "flex", gap: 12, marginTop: 8, justifyContent: "center" }}>
                {[["#3b82f6","حاضر"],["#fde68a","متأخر"],["#fee2e2","غائب"]].map(([c,l]) => (
                  <div key={l} style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 11, color: "#64748b" }}>
                    <div style={{ width: 10, height: 10, borderRadius: 2, background: c }} />{l}
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* MESSAGES TAB */}
        {empTab === "messages" && (
          <div>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 16 }}>
              <h3 style={{ margin: 0, color: "#1e3a5f", fontSize: 17, fontWeight: "800" }}>✉️ رسائلي من الإدارة</h3>
              <span style={{ fontSize: 13, color: "#64748b", fontWeight: "600" }}>{myMessages.length} رسالة</span>
            </div>
            {myMessages.length === 0 ? (
              <div style={{ background: "white", borderRadius: 14, padding: 40, textAlign: "center", color: "#94a3b8", fontSize: 14, boxShadow: "0 2px 10px rgba(0,0,0,0.06)" }}>

                {myMessages.map(msg => (
                  <div key={msg.id} style={{
                    background: msg.read ? "white" : "linear-gradient(135deg,#fff7ed,#fef3c7)",
                    borderRadius: 14, padding: "18px 20px",

                    boxShadow: msg.read ? "0 2px 8px rgba(0,0,0,0.05)" : "0 4px 16px rgba(245,158,11,0.25)",
                    position: "relative", overflow: "hidden",
                  }}>
                    {!msg.read && (

                    )}

                      </div>
                      <div>

                        <div style={{ fontSize: 11, color: "#94a3b8" }}>{new Date(msg.sentAt).toLocaleString("ar-EG")}</div>
                      </div>
                      {msg.read && (
                        <div style={{ marginRight: "auto", fontSize: 11, color: "#16a34a", fontWeight: "700", background: "#f0fdf4", padding: "3px 10px", borderRadius: 20 }}>

                    <p style={{ margin: 0, fontSize: 15, color: "#374151", lineHeight: 1.8, fontWeight: msg.read ? "500" : "700", paddingRight: 44 }}>
                      {msg.text}
                    </p>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}
// ══════════════════════════════════════════════
function TabManualAttendance({ employees, records, setRecords, settings, shifts, toast, branches }) {
  const [selEmp, setSelEmp] = useState("");
  const [selDate, setSelDate] = useState(getToday());
  const [checkIn, setCheckIn] = useState("");
  const [checkOut, setCheckOut] = useState("");
  const [notes, setNotes] = useState("");
  const [editModal, setEditModal] = useState(null);
  const [delConfirm, setDelConfirm] = useState(null);
  const [filterEmp, setFilterEmp] = useState("all");
  const [filterDate, setFilterDate] = useState("");
  const [filterBranch, setFilterBranch] = useState("all");

  // الموظفين حسب الفرع المختار
  const empsByBranch = filterBranch === "all"
    ? employees
    : employees.filter(e => e.branchId === filterBranch);

  const getEmpShift = (emp) => {
    if (!emp) return null;
    return shifts?.find(s => s.id === emp.shiftId) || null;
  };

  const getShiftStart = (emp) => getEmpShift(emp)?.start || settings.workStart;
  const getShiftTolerance = (emp) => {
    const sh = getEmpShift(emp);
    return sh ? Number(sh.tolerance) : Number(settings.lateTolerance);
  };

  function addRecord() {
    if (!selEmp) { toast("اختر موظفاً أولاً", "error"); return; }
    if (!selDate) { toast("اختر التاريخ", "error"); return; }
    if (!checkIn) { toast("أدخل وقت الحضور على الأقل", "error"); return; }
    const exists = records.find(r => r.employeeId === selEmp && r.date === selDate);
    if (exists) { toast("يوجد سجل لهذا الموظف في هذا اليوم — استخدم التعديل", "error"); return; }
    const emp = employees.find(e => e.id === selEmp);
    const late = calcLateMinutes(checkIn, getShiftStart(emp), getShiftTolerance(emp));
    const rec = {
      id: generateId(), employeeId: selEmp, date: selDate,
      checkIn, checkOut: checkOut || null,
      status: late > 0 ? "متأخر" : "حاضر",
      lateMinutes: late, notes: notes || "", addedByAdmin: true,
    };
    setRecords(p => [...p, rec]);
    toast("✅ تم إضافة سجل الحضور يدوياً");
    setCheckIn(""); setCheckOut(""); setNotes(""); setSelEmp(""); setSelDate(getToday());
  }

  // Edit modal
  function EditModal({ rec, onClose }) {
    const emp = employees.find(e => e.id === rec.employeeId);
    const [form, setForm] = useState({ checkIn: rec.checkIn || "", checkOut: rec.checkOut || "", notes: rec.notes || "", status: rec.status });
    const sf = (k, v) => setForm(p => ({ ...p, [k]: v }));

    function save() {
      if (!form.checkIn) { toast("وقت الحضور مطلوب", "error"); return; }
      const late = calcLateMinutes(form.checkIn, getShiftStart(emp), getShiftTolerance(emp));
      setRecords(p => p.map(r => r.id === rec.id ? {
        ...r, checkIn: form.checkIn, checkOut: form.checkOut || null,
        notes: form.notes, status: form.status,
        lateMinutes: form.status === "متأخر" ? late : 0,
        editedByAdmin: true,
      } : r));
      toast("✅ تم تعديل السجل");
      onClose();
    }

    return (
      <Modal title="✏️ تعديل سجل الحضور" onClose={onClose}>
        <div style={{ background: "#f0f9ff", borderRadius: 8, padding: "10px 14px", marginBottom: 16, fontSize: 13 }}>
          <strong>{emp?.name}</strong> — {rec.date} ({dayNameAr(rec.date)})
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 14 }}>
          <div>
            <label style={{ display: "block", marginBottom: 5, fontSize: 13, fontWeight: "700", color: "#374151" }}>وقت الحضور *</label>
            <input type="time" value={form.checkIn} onChange={e => sf("checkIn", e.target.value)}
              style={{ width: "100%", padding: "9px 12px", border: "2px solid #e2e8f0", borderRadius: 8, fontSize: 14 }} />
          </div>
          <div>
            <label style={{ display: "block", marginBottom: 5, fontSize: 13, fontWeight: "700", color: "#374151" }}>وقت الانصراف</label>
            <input type="time" value={form.checkOut} onChange={e => sf("checkOut", e.target.value)}
              style={{ width: "100%", padding: "9px 12px", border: "2px solid #e2e8f0", borderRadius: 8, fontSize: 14 }} />
          </div>
        </div>
        <div style={{ marginBottom: 14 }}>
          <label style={{ display: "block", marginBottom: 5, fontSize: 13, fontWeight: "700", color: "#374151" }}>الحالة</label>
          <div style={{ display: "flex", gap: 8 }}>
            {["حاضر", "متأخر", "غائب", "إجازة", "مأمورية"].map(s => (
              <button key={s} onClick={() => sf("status", s)} style={{
                padding: "7px 12px", border: "2px solid", borderRadius: 8, cursor: "pointer", fontSize: 12, fontWeight: "700", fontFamily: "Cairo, Arial",
                borderColor: form.status === s ? "#1e3a5f" : "#e2e8f0",
                background: form.status === s ? "#1e3a5f" : "white",
                color: form.status === s ? "white" : "#374151",
              }}>{s}</button>
            ))}
          </div>
        </div>
        <div style={{ marginBottom: 16 }}>
          <label style={{ display: "block", marginBottom: 5, fontSize: 13, fontWeight: "700", color: "#374151" }}>ملاحظات</label>
          <textarea value={form.notes} onChange={e => sf("notes", e.target.value)} rows={3} placeholder="أي ملاحظات..."
            style={{ width: "100%", padding: "9px 12px", border: "2px solid #e2e8f0", borderRadius: 8, fontSize: 14, fontFamily: "Cairo, Arial", resize: "vertical" }} />
        </div>
        <div style={{ display: "flex", gap: 10 }}>
          <button onClick={save} style={{ flex: 1, padding: "11px", background: "#1e3a5f", color: "white", border: "none", borderRadius: 8, fontWeight: "700", cursor: "pointer", fontFamily: "Cairo, Arial" }}>💾 حفظ التعديلات</button>
          <button onClick={onClose} style={{ flex: 1, padding: "11px", background: "#f1f5f9", color: "#64748b", border: "none", borderRadius: 8, fontWeight: "700", cursor: "pointer", fontFamily: "Cairo, Arial" }}>إلغاء</button>
        </div>
      </Modal>
    );
  }

  // Mark absent for a day
  function markAbsent(empId, date, status) {
    const exists = records.find(r => r.employeeId === empId && r.date === date);
    if (exists) {
      setRecords(p => p.map(r => r.id === exists.id ? { ...r, status, checkIn: null, checkOut: null, lateMinutes: 0, editedByAdmin: true } : r));
    } else {
      setRecords(p => [...p, { id: generateId(), employeeId: empId, date, checkIn: null, checkOut: null, status, lateMinutes: 0, notes: "", addedByAdmin: true }]);
    }
    toast(`✅ تم تسجيل "${status}" للموظف`);
  }

  const filteredRecs = records.filter(r => {
    if (filterEmp !== "all" && r.employeeId !== filterEmp) return false;
    if (filterBranch !== "all") {
      const emp = employees.find(e => e.id === r.employeeId);
      if (!emp || emp.branchId !== filterBranch) return false;
    }
    if (filterDate && r.date !== filterDate) return false;
    return true;
  }).sort((a, b) => b.date.localeCompare(a.date)).slice(0, 100);

  const getEmpName = (id) => employees.find(e => e.id === id)?.name || "غير معروف";

  const statusColors = {
    "حاضر": { bg: "#f0fdf4", color: "#16a34a" },
    "متأخر": { bg: "#fffbeb", color: "#d97706" },
    "غائب": { bg: "#fef2f2", color: "#dc2626" },
    "إجازة": { bg: "#f0f9ff", color: "#0891b2" },
    "مأمورية": { bg: "#faf5ff", color: "#7c3aed" },
  };

  const selEmpObj = employees.find(e => e.id === selEmp);
  const selEmpShift = selEmpObj ? getEmpShift(selEmpObj) : null;

  return (
    <div>
      {editModal && <EditModal rec={editModal} onClose={() => setEditModal(null)} />}
      {delConfirm && (
        <Modal title="⚠️ تأكيد الحذف" onClose={() => setDelConfirm(null)}>
          <p style={{ color: "#374151", marginTop: 0 }}>هل تريد حذف سجل حضور <strong>{getEmpName(delConfirm.employeeId)}</strong> بتاريخ <strong>{delConfirm.date}</strong>؟</p>
          <div style={{ display: "flex", gap: 10 }}>
            <button onClick={() => { setRecords(p => p.filter(r => r.id !== delConfirm.id)); toast("🗑️ تم حذف السجل", "error"); setDelConfirm(null); }}
              style={{ flex: 1, padding: "11px", background: "#ef4444", color: "white", border: "none", borderRadius: 8, fontWeight: "700", cursor: "pointer", fontFamily: "Cairo, Arial" }}>نعم، احذف</button>
            <button onClick={() => setDelConfirm(null)}
              style={{ flex: 1, padding: "11px", background: "#f1f5f9", color: "#374151", border: "none", borderRadius: 8, fontWeight: "700", cursor: "pointer", fontFamily: "Cairo, Arial" }}>إلغاء</button>
          </div>
        </Modal>
      )}

      <h2 style={{ margin: "0 0 20px", color: "#1e3a5f", fontSize: 20, fontWeight: "800" }}>📝 تسجيل حضور يدوي</h2>

      {/* ADD RECORD FORM */}
      <div style={{ background: "white", borderRadius: 14, padding: 24, marginBottom: 20, boxShadow: "0 2px 10px rgba(0,0,0,0.06)" }}>
        <h3 style={{ margin: "0 0 18px", color: "#1e3a5f", fontSize: 16, fontWeight: "800" }}>➕ إضافة سجل حضور جديد</h3>

        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px,1fr))", gap: 14, marginBottom: 16 }}>
          <div>
            <label style={{ display: "block", marginBottom: 5, fontSize: 13, fontWeight: "700", color: "#374151" }}>الموظف *</label>
            <select value={selEmp} onChange={e => setSelEmp(e.target.value)}
              style={{ width: "100%", padding: "10px 12px", border: "2px solid #e2e8f0", borderRadius: 8, fontSize: 14, fontFamily: "Cairo, Arial" }}>
              <option value="">— اختر موظفاً —</option>
              {employees.map(e => {
                const sh = shifts?.find(s => s.id === e.shiftId);
                return <option key={e.id} value={e.id}>{e.name}{sh ? ` (${sh.name})` : ""}</option>;
              })}
            </select>
          </div>
          <div>
            <label style={{ display: "block", marginBottom: 5, fontSize: 13, fontWeight: "700", color: "#374151" }}>التاريخ *</label>
            <input type="date" value={selDate} onChange={e => setSelDate(e.target.value)}
              style={{ width: "100%", padding: "10px 12px", border: "2px solid #e2e8f0", borderRadius: 8, fontSize: 14 }} />
          </div>
          <div>
            <label style={{ display: "block", marginBottom: 5, fontSize: 13, fontWeight: "700", color: "#374151" }}>وقت الحضور *</label>
            <input type="time" value={checkIn} onChange={e => setCheckIn(e.target.value)}
              style={{ width: "100%", padding: "10px 12px", border: "2px solid #e2e8f0", borderRadius: 8, fontSize: 14 }} />
          </div>
          <div>
            <label style={{ display: "block", marginBottom: 5, fontSize: 13, fontWeight: "700", color: "#374151" }}>وقت الانصراف</label>
            <input type="time" value={checkOut} onChange={e => setCheckOut(e.target.value)}
              style={{ width: "100%", padding: "10px 12px", border: "2px solid #e2e8f0", borderRadius: 8, fontSize: 14 }} />
          </div>
        </div>

        {/* Shift info preview */}
        {selEmpObj && (
          <div style={{ background: selEmpShift ? `${selEmpShift.color}10` : "#f0f9ff", border: `1px solid ${selEmpShift ? selEmpShift.color + "30" : "#bae6fd"}`, borderRadius: 8, padding: "10px 14px", marginBottom: 14, fontSize: 13 }}>
            <div style={{ display: "flex", gap: 16, flexWrap: "wrap", color: "#374151" }}>
              <span>👤 <strong>{selEmpObj.name}</strong></span>
              {selEmpShift && <span style={{ color: selEmpShift.color, fontWeight: "700" }}>🕐 {selEmpShift.name}: {selEmpShift.start} – {selEmpShift.end}</span>}
              <span>⏱️ سماح: {getShiftTolerance(selEmpObj)} دقيقة</span>
              {checkIn && <span style={{ color: calcLateMinutes(checkIn, getShiftStart(selEmpObj), getShiftTolerance(selEmpObj)) > 0 ? "#dc2626" : "#16a34a", fontWeight: "700" }}>
                {calcLateMinutes(checkIn, getShiftStart(selEmpObj), getShiftTolerance(selEmpObj)) > 0
                  ? `⚠️ متأخر ${calcLateMinutes(checkIn, getShiftStart(selEmpObj), getShiftTolerance(selEmpObj))} دقيقة`
                  : "✅ في الوقت"}
              </span>}
            </div>
          </div>
        )}

        <div style={{ marginBottom: 14 }}>
          <label style={{ display: "block", marginBottom: 5, fontSize: 13, fontWeight: "700", color: "#374151" }}>ملاحظات (اختياري)</label>
          <input value={notes} onChange={e => setNotes(e.target.value)} placeholder="مثال: نسي يسجل — تم التحقق يدوياً"
            style={{ width: "100%", padding: "10px 12px", border: "2px solid #e2e8f0", borderRadius: 8, fontSize: 14, fontFamily: "Cairo, Arial" }} />
        </div>

        <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
          <button onClick={addRecord} style={{ padding: "11px 24px", background: "#1e3a5f", color: "white", border: "none", borderRadius: 8, fontWeight: "700", cursor: "pointer", fontSize: 14, fontFamily: "Cairo, Arial" }}>
            ✅ إضافة سجل الحضور
          </button>
          {selEmp && selDate && (
            <>
              <button onClick={() => markAbsent(selEmp, selDate, "غائب")} style={{ padding: "11px 16px", background: "#fef2f2", color: "#dc2626", border: "2px solid #fca5a5", borderRadius: 8, fontWeight: "700", cursor: "pointer", fontSize: 14, fontFamily: "Cairo, Arial" }}>
                ❌ تسجيل غياب
              </button>
              <button onClick={() => markAbsent(selEmp, selDate, "إجازة")} style={{ padding: "11px 16px", background: "#f0f9ff", color: "#0891b2", border: "2px solid #bae6fd", borderRadius: 8, fontWeight: "700", cursor: "pointer", fontSize: 14, fontFamily: "Cairo, Arial" }}>
                🏖️ تسجيل إجازة
              </button>
              <button onClick={() => markAbsent(selEmp, selDate, "مأمورية")} style={{ padding: "11px 16px", background: "#faf5ff", color: "#7c3aed", border: "2px solid #ddd6fe", borderRadius: 8, fontWeight: "700", cursor: "pointer", fontSize: 14, fontFamily: "Cairo, Arial" }}>
                🚗 تسجيل مأمورية
              </button>
            </>
          )}
        </div>
      </div>

      {/* BULK ABSENCE SECTION */}
      <div style={{ background: "white", borderRadius: 14, padding: 20, marginBottom: 20, boxShadow: "0 2px 10px rgba(0,0,0,0.06)" }}>
        <h3 style={{ margin: "0 0 14px", color: "#1e3a5f", fontSize: 15, fontWeight: "800" }}>📋 تسجيل غياب جماعي لتاريخ محدد</h3>
        <div style={{ display: "flex", gap: 12, alignItems: "center", flexWrap: "wrap" }}>
          <div>
            <label style={{ display: "block", marginBottom: 5, fontSize: 13, fontWeight: "700", color: "#374151" }}>التاريخ</label>
            <input type="date" value={selDate} onChange={e => setSelDate(e.target.value)}
              style={{ padding: "9px 12px", border: "2px solid #e2e8f0", borderRadius: 8, fontSize: 14 }} />
          </div>
          <div style={{ alignSelf: "flex-end" }}>
            <button onClick={() => {
              const absent = employees.filter(e => !records.find(r => r.employeeId === e.id && r.date === selDate));
              if (absent.length === 0) { toast("كل الموظفين لديهم سجلات في هذا اليوم", "error"); return; }
              if (!window.confirm(`سيتم تسجيل غياب لـ ${absent.length} موظف في ${selDate}. تأكيد؟`)) return;
              const newRecs = absent.map(e => ({ id: generateId(), employeeId: e.id, date: selDate, checkIn: null, checkOut: null, status: "غائب", lateMinutes: 0, notes: "تسجيل غياب تلقائي", addedByAdmin: true }));
              setRecords(p => [...p, ...newRecs]);
              toast(`✅ تم تسجيل غياب ${absent.length} موظف`);
            }} style={{ padding: "10px 18px", background: "#dc2626", color: "white", border: "none", borderRadius: 8, fontWeight: "700", cursor: "pointer", fontSize: 14, fontFamily: "Cairo, Arial" }}>
              ❌ تسجيل غياب للغائبين ({employees.filter(e => !records.find(r => r.employeeId === e.id && r.date === selDate)).length} موظف)
            </button>
          </div>
        </div>
      </div>

      {/* RECORDS TABLE WITH EDIT/DELETE */}
      <div style={{ background: "white", borderRadius: 14, overflow: "hidden", boxShadow: "0 2px 10px rgba(0,0,0,0.06)" }}>
        <div style={{ padding: "16px 20px", borderBottom: "1px solid #f1f5f9", display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 10 }}>
          <h3 style={{ margin: 0, color: "#1e3a5f", fontSize: 15, fontWeight: "800" }}>🗂️ كل السجلات — تعديل وحذف</h3>
          <div style={{ display: "flex", gap: 8 }}>
            {branches && branches.length > 0 && (
              <select value={filterBranch} onChange={e => { setFilterBranch(e.target.value); setFilterEmp("all"); }}
                style={{ padding: "7px 10px", border: "2px solid #e2e8f0", borderRadius: 8, fontSize: 13, fontFamily: "Cairo, Arial", background: filterBranch !== "all" ? "#eff6ff" : "white", borderColor: filterBranch !== "all" ? "#2563a8" : "#e2e8f0" }}>
                <option value="all">🏪 كل الفروع</option>
                {branches.map(b => <option key={b.id} value={b.id}>🏪 {b.name}</option>)}
              </select>
            )}
            <select value={filterEmp} onChange={e => setFilterEmp(e.target.value)}
              style={{ padding: "7px 10px", border: "2px solid #e2e8f0", borderRadius: 8, fontSize: 13, fontFamily: "Cairo, Arial" }}>
              <option value="all">كل الموظفين</option>
              {empsByBranch.map(e => <option key={e.id} value={e.id}>{e.name}</option>)}
            </select>
            <input type="date" value={filterDate} onChange={e => setFilterDate(e.target.value)}
              style={{ padding: "7px 10px", border: "2px solid #e2e8f0", borderRadius: 8, fontSize: 13 }} />
            <button onClick={() => { setFilterEmp("all"); setFilterDate(""); setFilterBranch("all"); }}
              style={{ padding: "7px 12px", background: "#f1f5f9", border: "none", borderRadius: 8, cursor: "pointer", fontSize: 13, fontFamily: "Cairo, Arial", color: "#64748b", fontWeight: "700" }}>
              🔄 مسح
            </button>
          </div>
        </div>
        <div style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontFamily: "Cairo, Arial" }}>
            <thead>
              <tr style={{ background: "#1e3a5f", color: "white" }}>
                {["الموظف", "التاريخ", "اليوم", "الحضور", "الانصراف", "ساعات العمل", "التأخير", "الحالة", "ملاحظات", "إجراءات"].map(h => (
                  <th key={h} style={{ padding: "11px 12px", textAlign: "right", fontSize: 12, fontWeight: "700", whiteSpace: "nowrap" }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {filteredRecs.length === 0 ? (
                <tr><td colSpan={10} style={{ textAlign: "center", padding: 32, color: "#94a3b8" }}>لا توجد سجلات</td></tr>
              ) : filteredRecs.map((r, i) => {
                const sc = statusColors[r.status] || { bg: "#f1f5f9", color: "#64748b" };
                const recEmp = employees.find(e => e.id === r.employeeId);
                const recBranch = recEmp && branches ? (branches || []).find(b => b.id === recEmp.branchId) : null;
                return (
                  <tr key={r.id} style={{ background: i % 2 === 0 ? "#f8fafc" : "white" }}>
                    <td style={{ padding: "10px 12px", fontWeight: "700", color: "#1e293b", fontSize: 13 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" }}>
                        {r.addedByAdmin && <span title="أضافه المدير" style={{ fontSize: 10, background: "#dbeafe", color: "#2563a8", padding: "1px 5px", borderRadius: 4, fontWeight: "700" }}>يدوي</span>}
                        {r.editedByAdmin && <span title="عدّله المدير" style={{ fontSize: 10, background: "#fef9c3", color: "#854d0e", padding: "1px 5px", borderRadius: 4, fontWeight: "700" }}>معدّل</span>}
                        {recBranch && <span style={{ fontSize: 10, background: "#f0fdf4", color: "#16a34a", padding: "1px 5px", borderRadius: 4, fontWeight: "700" }}>🏪 {recBranch.name}</span>}
                        {getEmpName(r.employeeId)}
                      </div>
                    </td>
                    <td style={{ padding: "10px 12px", fontSize: 12, color: "#475569" }}>{r.date}</td>
                    <td style={{ padding: "10px 12px", fontSize: 12, color: "#475569" }}>{dayNameAr(r.date)}</td>
                    <td style={{ padding: "10px 12px", fontWeight: "700", color: "#059669", fontSize: 13 }}>{r.checkIn || "—"}</td>
                    <td style={{ padding: "10px 12px", fontWeight: "700", color: "#dc2626", fontSize: 13 }}>{r.checkOut || "—"}</td>
                    <td style={{ padding: "10px 12px", fontWeight: "700", color: "#2563a8", fontSize: 12 }}>{calcWorkHours(r.checkIn, r.checkOut)}</td>
                    <td style={{ padding: "10px 12px", fontSize: 12, color: r.lateMinutes > 0 ? "#d97706" : "#94a3b8", fontWeight: "700" }}>
                      {r.lateMinutes > 0 ? `${r.lateMinutes}د` : "—"}
                    </td>
                    <td style={{ padding: "10px 12px" }}>
                      <span style={{ background: sc.bg, color: sc.color, padding: "2px 8px", borderRadius: 20, fontSize: 11, fontWeight: "700" }}>{r.status}</span>
                    </td>
                    <td style={{ padding: "10px 12px", fontSize: 11, color: "#64748b", maxWidth: 120 }}>
                      {r.notes ? <span title={r.notes} style={{ cursor: "help" }}>📝 {r.notes.slice(0, 20)}{r.notes.length > 20 ? "..." : ""}</span> : "—"}
                    </td>
                    <td style={{ padding: "10px 12px" }}>
                      <div style={{ display: "flex", gap: 4 }}>
                        <button onClick={() => setEditModal(r)} style={{ padding: "5px 8px", background: "#eff6ff", color: "#2563a8", border: "none", borderRadius: 5, cursor: "pointer", fontSize: 11, fontWeight: "700", fontFamily: "Cairo, Arial" }}>✏️</button>
                        <button onClick={() => setDelConfirm(r)} style={{ padding: "5px 8px", background: "#fef2f2", color: "#dc2626", border: "none", borderRadius: 5, cursor: "pointer", fontSize: 11, fontWeight: "700", fontFamily: "Cairo, Arial" }}>🗑️</button>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
        {filteredRecs.length > 0 && (
          <div style={{ padding: "10px 16px", background: "#f8fafc", borderTop: "1px solid #f1f5f9", fontSize: 12, color: "#94a3b8" }}>
            يعرض {filteredRecs.length} سجل (آخر 100)
          </div>
        )}
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════
//  ROOT APP
// ══════════════════════════════════════════════
function App() {
  const db = useDB();
  const [user, setUser]               = useState(null);
  const [adminBypass, setAdminBypass] = useState(false);
  const { deviceId, status, approvedBranchId, deviceName, requestApproval } = useDeviceAuth();

  useEffect(() => {
    const hasEmps = localStorage.getItem(KEYS.employees);
    const hasRecs = localStorage.getItem(KEYS.records);
    if (!hasEmps) localStorage.setItem(KEYS.employees, JSON.stringify(DEFAULT_EMPLOYEES));
    if (!hasRecs) localStorage.setItem(KEYS.records, JSON.stringify(DEFAULT_RECORDS));
    if (!localStorage.getItem(KEYS.settings)) localStorage.setItem(KEYS.settings, JSON.stringify(DEFAULT_SETTINGS));
    if (!localStorage.getItem(KEYS.shifts)) localStorage.setItem(KEYS.shifts, JSON.stringify(DEFAULT_SHIFTS));
    if (!hasEmps) {
      const upload = () => {
        const fsdb = window.__fsdb;
        if (!fsdb) { setTimeout(upload, 300); return; }
        fsdb.collection("employees").get().then(snap => {
          if (!snap.empty) return;
          const batch = fsdb.batch();
          DEFAULT_EMPLOYEES.forEach(e => batch.set(fsdb.collection("employees").doc(e.id), e));
          DEFAULT_RECORDS.forEach(r => batch.set(fsdb.collection("records").doc(r.id), r));
          DEFAULT_SHIFTS.forEach(s => batch.set(fsdb.collection("shifts").doc(s.id), s));
          batch.set(fsdb.collection("settings").doc("main"), DEFAULT_SETTINGS);
          batch.commit().catch(() => {});
        }).catch(() => {});
      };
      setTimeout(upload, 500);
    }
  }, []);

  const branches = db.branches || [];

  // الموظفين المرئيين — بس من فرع الجهاز المعتمد
  const visibleEmployees = (approvedBranchId && branches.length > 0)
    ? db.employees.filter(e => e.branchId === approvedBranchId)
    : db.employees;

  function handleLogin(u) { setUser(u); setAdminBypass(false); }
  function handleLogout()  { setUser(null); setAdminBypass(false); }

  // المدير دايماً يعدّي
  // لو مفيش فروع → شتغل عادي
  const noBranches = branches.length === 0;

  // ما يعرضه للمستخدم لما مش logged in
  function renderGate() {
    // bypass المدير
    if (adminBypass) {
      return <LoginScreen onLogin={handleLogin} settings={db.settings} employees={visibleEmployees} branches={branches} deviceBranchId={approvedBranchId} adminOnly={true} />;
    }
    // مفيش فروع بعد → شاشة عادية
    if (noBranches) {
      return <LoginScreen onLogin={handleLogin} settings={db.settings} employees={db.employees} branches={[]} deviceBranchId={null} />;
    }
    // لسه بنتحقق من Firebase
    if (status === "checking") {
      return (
        <div style={{ minHeight: "100vh", background: "linear-gradient(135deg,#0a1628,#1e3a5f)", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "Cairo, Arial" }}>
          <div style={{ textAlign: "center", color: "white" }}>
            <div style={{ fontSize: 48, marginBottom: 16 }}>⚙️</div>
            <div style={{ fontSize: 16, fontWeight: "700" }}>جاري التحقق من الجهاز...</div>
          </div>
        </div>
      );
    }
    // جهاز جديد أو طلب معلق
    if (status === "unknown" || status === "pending") {
      return <DeviceRequestScreen branches={branches} status={status} deviceName={deviceName} onRequest={requestApproval} onAdminBypass={() => setAdminBypass(true)} />;
    }
    // جهاز مرفوض
    if (status === "rejected") {
      return (
        <DeviceRejectedScreen
          onRetry={() => { const fsdb = window.__fsdb; if (fsdb) fsdb.collection("devices").doc(deviceId).delete(); }}
          onAdminBypass={() => setAdminBypass(true)}
        />
      );
    }
    // جهاز معتمد ✅
    if (status === "approved") {
      return <LoginScreen onLogin={handleLogin} settings={db.settings} employees={visibleEmployees} branches={branches} deviceBranchId={approvedBranchId} />;
    }
    return null;
  }

  return (
    <>
      <SyncIndicator synced={db.synced} online={db.online} />
      {user && user.role === "admin"    && <AdminDashboard    user={user} onLogout={handleLogout} db={db} />}
      {user && user.role === "employee" && <EmployeeDashboard user={user} onLogout={handleLogout} db={db} />}
      {!user && renderGate()}
    </>
  );
}


    window.__appStarted = true;
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
    setTimeout(function() { var ls = document.getElementById('loading-screen'); if (ls) ls.classList.add('hidden'); }, 1200);
  </script>
</body>
</html>
